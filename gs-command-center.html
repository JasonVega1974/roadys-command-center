<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roady's GS Command Center</title>
<style>
:root{
  --bg:#0b0f19;--bg2:#111827;--bg3:#1a2236;--surface:#1e293b;
  --border:#2a3650;--border2:#334155;
  --text:#e2e8f0;--dim:#94a3b8;--muted:#64748b;
  --accent:#38bdf8;--cyan:#22d3ee;--green:#10b981;--yellow:#fbbf24;
  --red:#ef4444;--purple:#a78bfa;--orange:#fb923c;--pink:#f472b6;
  --ff:'Segoe UI',system-ui,-apple-system,sans-serif;
  --fm:'Cascadia Code','Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══ LOGIN SCREEN ═══ */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:380px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.login-logo{font-size:2em;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,var(--cyan),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:.78em;color:var(--muted);margin-bottom:28px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:20px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);transition:all .15s}
.pin-dot.filled{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,.4)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto}
.pin-key{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:1.2em;font-weight:700;color:var(--text);cursor:pointer;transition:all .1s;user-select:none}
.pin-key:hover{background:var(--surface);border-color:var(--accent)}
.pin-key:active{transform:scale(.95);background:var(--accent);color:var(--bg)}
.pin-key.fn{font-size:.75em;color:var(--muted)}
.login-error{color:var(--red);font-size:.78em;min-height:20px;margin-top:12px}

/* ═══ LAYOUT ═══ */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.topbar-logo{font-weight:900;font-size:1.1em;background:linear-gradient(135deg,var(--cyan),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-user .name{font-weight:700;font-size:.85em}
.topbar-user .role{font-size:.7em;color:var(--muted)}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:.8em;font-family:var(--ff);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-cyan{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.3);color:var(--cyan)}
.btn-green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.btn-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.btn-yellow{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--yellow)}

/* TABS */
.tabs{display:flex;gap:2px;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:.82em;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab .badge{background:var(--red);color:#fff;font-size:.65em;padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:700}

/* PANELS */
.panel{display:none;padding:20px}
.panel.active{display:block}
.container{max-width:1400px;margin:0 auto}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card-hd{font-weight:800;font-size:.88em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.kpi-val{font-size:1.4em;font-weight:900}
.kpi-label{font-size:.7em;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.kpi.cyan .kpi-val{color:var(--cyan)}
.kpi.green .kpi-val{color:var(--green)}
.kpi.yellow .kpi-val{color:var(--yellow)}
.kpi.red .kpi-val{color:var(--red)}
.kpi.purple .kpi-val{color:var(--purple)}
.kpi.orange .kpi-val{color:var(--orange)}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.8em}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-weight:700;font-size:.75em;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(56,189,248,.03)}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:rgba(56,189,248,.06)}
.num{text-align:right;font-family:var(--fm);font-size:.85em}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-bar input,.search-bar select{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-size:.82em;font-family:var(--ff)}
.search-bar input{flex:1;min-width:200px}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:var(--accent)}

/* SITE DETAIL DRAWER */
#site-drawer{position:fixed;top:0;right:-520px;width:500px;max-width:92vw;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:200;transition:right .25s ease;overflow-y:auto;padding:20px;box-shadow:-5px 0 30px rgba(0,0,0,.4)}
#site-drawer.open{right:0}
.drawer-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:1.4em;cursor:pointer}
.drawer-close:hover{color:var(--red)}
.drawer-hd{font-size:1.1em;font-weight:900;margin-bottom:4px;padding-right:30px}
.drawer-sub{font-size:.78em;color:var(--muted);margin-bottom:14px}
.drawer-section{margin-top:16px}
.drawer-section h4{font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:8px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-item{font-size:.78em;padding:6px 8px;background:var(--bg3);border-radius:5px}
.info-item .lbl{color:var(--muted);font-size:.85em}
.info-item .val{font-weight:700;margin-top:1px}

/* CRM LOG */
.log-entry{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}
.log-entry .log-date{font-size:.72em;color:var(--muted);font-family:var(--fm)}
.log-entry .log-type{font-size:.68em;padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block;margin-left:6px}
.log-entry .log-body{font-size:.82em;margin-top:4px;line-height:1.5}
.type-call{background:rgba(34,211,238,.15);color:var(--cyan)}
.type-task{background:rgba(251,191,36,.15);color:var(--yellow)}
.type-note{background:rgba(148,163,184,.15);color:var(--dim)}
.type-urgent{background:rgba(239,68,68,.15);color:var(--red)}
.type-followup{background:rgba(16,185,129,.15);color:var(--green)}

/* AGING COLORS */
.age-fresh{border-left:3px solid var(--green)}
.age-warm{border-left:3px solid var(--yellow)}
.age-stale{border-left:3px solid var(--orange)}
.age-critical{border-left:3px solid var(--red)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-hd{font-size:.65em;text-align:center;color:var(--muted);padding:4px;font-weight:700}
.cal-day{text-align:center;padding:6px 2px;font-size:.75em;border-radius:4px;min-height:36px;cursor:pointer;position:relative}
.cal-day:hover{background:var(--bg3)}
.cal-day.today{background:rgba(34,211,238,.1);color:var(--cyan);font-weight:700}
.cal-day.other{color:var(--border2)}
.cal-day .cal-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0;display:block}
.cal-day .cal-dot.dot-call{background:var(--cyan)}
.cal-day .cal-dot.dot-task{background:var(--yellow)}
.cal-day .cal-dot.dot-urgent{background:var(--red)}

/* RATES TABLE */
.rate-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.rate-card .proc{font-weight:800;font-size:.85em;margin-bottom:2px}
.rate-card .rate{font-size:.78em;color:var(--cyan);font-family:var(--fm)}
.rate-card .note{font-size:.7em;color:var(--muted);margin-top:2px}

/* CALCULATOR */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.calc-input{display:flex;flex-direction:column;gap:4px}
.calc-input label{font-size:.72em;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.calc-input input,.calc-input select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--fm);font-size:.9em}
.calc-input input:focus,.calc-input select:focus{outline:none;border-color:var(--cyan)}
.calc-result{background:linear-gradient(135deg,rgba(34,211,238,.05),rgba(16,185,129,.05));border:1px solid rgba(34,211,238,.2);border-radius:10px;padding:16px;margin-top:12px}
.calc-result .cr-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85em}
.calc-result .cr-row.total{font-weight:900;font-size:1em;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.calc-result .cr-val{font-family:var(--fm);color:var(--cyan)}

/* FORM */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.72em;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--ff);font-size:.85em}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--cyan)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:8px;font-size:.82em;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;width:500px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal h3{font-size:1em;font-weight:800;margin-bottom:14px}

@media(max-width:768px){
  .panel{padding:12px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .calc-grid{grid-template-columns:1fr}
  .tabs{padding:0 8px}
  .tab{padding:8px 12px;font-size:.75em}
}

/* ═══ TERRITORY MAP ═══ */
.ter-map-wrap{position:relative;margin-bottom:16px}
.us-map{width:100%;max-width:900px;margin:0 auto;display:block}
.gs-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.gs-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;border-left:4px solid var(--muted)}
.gs-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.gs-card .gs-name{font-weight:900;font-size:.92em;margin-bottom:2px}
.gs-card .gs-region{font-size:.72em;color:var(--muted);margin-bottom:8px}
.gs-card .gs-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gs-card .gs-stat{text-align:center}
.gs-card .gs-stat-val{font-weight:800;font-size:1.05em}
.gs-card .gs-stat-lbl{font-size:.62em;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ter-sub-tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--bg3);border-radius:8px;padding:3px;width:fit-content}
.ter-sub-tab{padding:7px 16px;border-radius:6px;font-size:.78em;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.ter-sub-tab:hover{color:var(--text)}
.ter-sub-tab.active{background:var(--accent);color:var(--bg);font-weight:700}
.state-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.state-pill{background:var(--bg);padding:2px 7px;border-radius:4px;font-size:.68em;font-weight:700;color:var(--dim);border:1px solid var(--border)}

/* ═══ CRM ENHANCED ═══ */
.task-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.task-col{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;min-height:200px}
.task-col-hd{font-weight:800;font-size:.82em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.task-col-hd .col-count{background:var(--bg);padding:1px 7px;border-radius:10px;font-size:.78em;color:var(--muted)}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.task-item:hover{border-color:var(--accent);background:rgba(56,189,248,.03)}
.task-item .task-title{font-weight:700;font-size:.82em;margin-bottom:3px}
.task-item .task-meta{font-size:.7em;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.task-item .task-site{font-size:.72em;color:var(--cyan)}
.task-pri-high{border-left:3px solid var(--red)}
.task-pri-med{border-left:3px solid var(--yellow)}
.task-pri-low{border-left:3px solid var(--green)}
.task-status{font-size:.65em;padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block}
.ts-todo{background:rgba(148,163,184,.15);color:var(--dim)}
.ts-progress{background:rgba(34,211,238,.15);color:var(--cyan)}
.ts-waiting{background:rgba(251,191,36,.15);color:var(--yellow)}
.ts-done{background:rgba(16,185,129,.15);color:var(--green)}
.crm-view-toggle{display:flex;gap:2px;background:var(--bg3);border-radius:6px;padding:2px;width:fit-content}
.crm-vt{padding:5px 12px;border-radius:4px;font-size:.75em;font-weight:600;color:var(--muted);cursor:pointer}
.crm-vt.active{background:var(--accent);color:var(--bg)}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ROADY'S</div>
    <div style="font-size:.82em;font-weight:700;margin-bottom:2px">Growth Strategist Command Center</div>
    <div class="login-sub">Enter your PIN to continue</div>
    <div class="pin-dots" id="pin-dots"></div>
    <div class="pin-pad" id="pin-pad"></div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-logo">⛽ GS Command Center</div>
    <div class="topbar-user">
      <div><div class="name" id="tb-name"></div><div class="role" id="tb-role"></div></div>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="tabs" id="main-tabs">
    <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard',this)">📊 Dashboard</div>
    <div class="tab" data-tab="territory" onclick="switchTab('territory',this)">🗺️ Territory</div>
    <div class="tab" data-tab="crm" onclick="switchTab('crm',this)">📋 CRM / Tasks</div>
    <div class="tab" data-tab="calendar" onclick="switchTab('calendar',this)">📅 Calendar</div>
    <div class="tab" data-tab="rates" onclick="switchTab('rates',this)">💰 Rates & Fees</div>
    <div class="tab" data-tab="calculator" onclick="switchTab('calculator',this)">🧮 Calculator</div>
    <div class="tab" data-tab="fuel-intro" onclick="switchTab('fuel-intro',this)">🔥 Fuel Intro</div>
    <div class="tab" data-tab="critical" onclick="switchTab('critical',this)">🚨 Critical<span class="badge" id="crit-badge" style="display:none">0</span></div>
  </div>

  <!-- ═══ DASHBOARD ═══ -->
  <div class="panel active" id="p-dashboard"><div class="container" id="dash-content"></div></div>

  <!-- ═══ TERRITORY ═══ -->
  <div class="panel" id="p-territory"><div class="container" id="ter-content"></div></div>

  <!-- ═══ CRM ═══ -->
  <div class="panel" id="p-crm"><div class="container" id="crm-content"></div></div>

  <!-- ═══ CALENDAR ═══ -->
  <div class="panel" id="p-calendar"><div class="container" id="cal-content"></div></div>

  <!-- ═══ RATES ═══ -->
  <div class="panel" id="p-rates"><div class="container" id="rates-content"></div></div>

  <!-- ═══ CALCULATOR ═══ -->
  <div class="panel" id="p-calculator"><div class="container" id="calc-content"></div></div>

  <!-- ═══ FUEL INTRO ═══ -->
  <div class="panel" id="p-fuel-intro"><div class="container" id="fuel-content"></div></div>

  <!-- ═══ CRITICAL ═══ -->
  <div class="panel" id="p-critical"><div class="container" id="crit-content"></div></div>
</div>

<!-- SITE DETAIL DRAWER -->
<div id="site-drawer">
  <button class="drawer-close" onclick="closeDrawer()">&times;</button>
  <div id="drawer-body"></div>
</div>

<!-- ADD LOG MODAL -->
<div class="overlay" id="log-modal">
  <div class="modal">
    <h3>📝 Add Activity Log</h3>
    <input type="hidden" id="log-site-id">
    <div class="form-row">
      <div class="fg"><label>Type</label>
        <select id="log-type"><option value="call">📞 Call</option><option value="task">✅ Task</option><option value="note">📝 Note</option><option value="followup">🔄 Follow-up</option><option value="urgent">🚨 Urgent</option></select>
      </div>
      <div class="fg"><label>Date/Time</label><input type="datetime-local" id="log-dt"></div>
    </div>
    <div class="fg" style="margin-bottom:10px"><label>Subject</label><input id="log-subject" placeholder="Brief subject line..."></div>
    <div class="fg" style="margin-bottom:14px"><label>Notes</label><textarea id="log-notes" rows="3" placeholder="Details..."></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('log-modal')">Cancel</button>
      <button class="btn btn-cyan" onclick="saveLog()">Save</button>
    </div>
  </div>
</div>

<!-- SCHEDULE CALL MODAL -->
<div class="overlay" id="sched-modal">
  <div class="modal">
    <h3>📅 Schedule Call</h3>
    <input type="hidden" id="sched-site-id">
    <div class="form-row">
      <div class="fg"><label>Date</label><input type="date" id="sched-date"></div>
      <div class="fg"><label>Time</label><input type="time" id="sched-time" value="09:00"></div>
    </div>
    <div class="fg" style="margin-bottom:10px"><label>Contact Name</label><input id="sched-contact" placeholder="Who to call..."></div>
    <div class="fg" style="margin-bottom:14px"><label>Purpose</label><textarea id="sched-purpose" rows="2" placeholder="Reason for call..."></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal('sched-modal')">Cancel</button>
      <button class="btn btn-green" onclick="saveSchedule()">Schedule</button>
    </div>
  </div>
</div>


<!-- ADD/EDIT TASK MODAL -->
<div class="overlay" id="task-modal">
  <div class="modal">
    <h3 id="task-modal-title">Add Task</h3>
    <input type="hidden" id="task-edit-id">
    <div class="form-row">
      <div class="fg"><label>Task Title</label><input id="task-title" placeholder="What needs to be done..."></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Site</label>
        <select id="task-site"><option value="">-- Select Stop --</option></select>
      </div>
      <div class="fg"><label>Priority</label>
        <select id="task-pri"><option value="low">Low</option><option value="med" selected>Medium</option><option value="high">High</option></select>
      </div>
    </div>

function loadData(){
  const k = LS_KEY + (currentUser?.name||'shared');
  try{
    const d=JSON.parse(localStorage.getItem(k+'_logs')||'{}');activityLogs=d;
  }catch(e){activityLogs={};}
  try{scheduledCalls=JSON.parse(localStorage.getItem(k+'_sched')||'[]');}catch(e){scheduledCalls=[];}
  try{siteExtras=JSON.parse(localStorage.getItem(k+'_extras')||'{}');}catch(e){siteExtras={};}
  try{criticalItems=JSON.parse(localStorage.getItem(k+'_critical')||'[]');}catch(e){criticalItems=[];}
  try{tasks=JSON.parse(localStorage.getItem(k+'_tasks')||'[]');}catch(e){tasks=[];}
}
function saveData(){
  const k = LS_KEY + (currentUser?.name||'shared');
  localStorage.setItem(k+'_logs',JSON.stringify(activityLogs));
  localStorage.setItem(k+'_sched',JSON.stringify(scheduledCalls));
  localStorage.setItem(k+'_extras',JSON.stringify(siteExtras));
  localStorage.setItem(k+'_critical',JSON.stringify(criticalItems));
  localStorage.setItem(k+'_tasks',JSON.stringify(tasks));
}

// LOGIN
// ═══════════════════════════════════════════════════════
let pinEntry = '';
function initLogin(){
  const dots = document.getElementById('pin-dots');
  dots.innerHTML = [0,1,2,3].map(()=>'<div class="pin-dot"></div>').join('');
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = [1,2,3,4,5,6,7,8,9,'C',0,'→'].map(k=>{
    const cls = (k==='C'||k==='→')?'pin-key fn':'pin-key';
    return `<div class="${cls}" onclick="pinPress('${k}')">${k==='→'?'Enter':k==='C'?'Clear':k}</div>`;
  }).join('');
}
function pinPress(k){
  const err = document.getElementById('login-error');
  err.textContent = '';
  if(k==='C'){pinEntry='';updateDots();return;}
  if(k==='→'){
    const user = GS_PINS[pinEntry];
    if(user){loginAs(user);}
    else{err.textContent='Invalid PIN';pinEntry='';updateDots();}
    return;
  }
  if(pinEntry.length<4){pinEntry+=k;updateDots();}
  if(pinEntry.length===4){
    setTimeout(()=>{
      const user=GS_PINS[pinEntry];
      if(user){loginAs(user);}
      else{err.textContent='Invalid PIN';pinEntry='';updateDots();}
    },200);
  }
}
function updateDots(){
  document.querySelectorAll('.pin-dot').forEach((d,i)=>{
    d.classList.toggle('filled',i<pinEntry.length);
  });
}
function loginAs(user){
  currentUser=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tb-name').textContent=user.name;
  document.getElementById('tb-role').textContent=user.role;
  // Filter stops
  if(user.isManager){
    myStops = MEMBERS.filter(m=>m.status==='active'&&m.group!=='None');
  } else {
    const region = REGIONS[user.name];
    const states = region ? region.states : [];
    myStops = MEMBERS.filter(m=>m.status==='active'&&m.group!=='None'&&states.includes(m.state));
  }
  loadData();
  renderAll();
}
function logout(){
  currentUser=null;pinEntry='';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  updateDots();
}

function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fG(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function openModal(id){document.getElementById(id).classList.add('show');}

function getLastContact(siteId){
  const logs=(activityLogs[siteId]||[]).filter(l=>l.type==='call');
  if(!logs.length)return null;
  return logs.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
}
function ageDays(dateStr){
  if(!dateStr)return 999;
  return Math.floor((Date.now()-new Date(dateStr).getTime())/(1000*60*60*24));
}
function ageClass(days){
  if(days<=7)return 'age-fresh';
  if(days<=21)return 'age-warm';
  if(days<=45)return 'age-stale';
  return 'age-critical';
}
function ageLabel(days){
  if(days>=999)return '<span style="color:var(--red)">Never</span>';
  if(days===0)return '<span style="color:var(--green)">Today</span>';
  if(days<=7)return `<span style="color:var(--green)">${days}d ago</span>`;
  if(days<=21)return `<span style="color:var(--yellow)">${days}d ago</span>`;
  if(days<=45)return `<span style="color:var(--orange)">${days}d ago</span>`;
  return `<span style="color:var(--red)">${days}d ago</span>`;
}

function filterTerritory(){
  const q=(document.getElementById('ter-search')?.value||'').toLowerCase();
  const tf=document.getElementById('ter-type')?.value||'';
  const gf=document.getElementById('ter-group')?.value||'';
  const sf=document.getElementById('ter-state')?.value||'';
  let d=myStops.filter(s=>{
    if(q&&!s.name.toLowerCase().includes(q)&&!s.city.toLowerCase().includes(q)&&!s.state.toLowerCase().includes(q)&&!s.id.toLowerCase().includes(q)&&!(s.company||'').toLowerCase().includes(q))return false;
    if(tf&&s.type!==tf)return false;
    if(gf&&s.group!==gf)return false;
    if(sf&&s.state!==sf)return false;
    return true;
  });
  const tb=document.getElementById('ter-tbody');if(!tb)return;
  tb.innerHTML=d.map((s,i)=>{
    const lc=getLastContact(s.id);
    const days=ageDays(lc?.date);
    const mgr=MANAGER_MAP[s.state]||'—';
    return `<tr class="clickable ${ageClass(days)}" onclick="openSiteDrawer('${s.id}')">

      <td style="font-size:.75em;color:var(--muted)">${esc(s.id)}</td>

      <td style="font-size:.78em">${esc(s.group)}</td>

}

function renderCRM(){
  const view = document.querySelector('.crm-vt.active')?.dataset?.view || 'board';

  // Build task list
  const allTasks = (tasks||[]).sort((a,b)=>{
    const priOrd={high:0,med:1,low:2};
    if(a.status==='done'&&b.status!=='done')return 1;
    if(b.status==='done'&&a.status!=='done')return -1;
    return (priOrd[a.priority]||1)-(priOrd[b.priority]||1);
  });

  // All activity logs
  const allLogs=[];
  Object.entries(activityLogs).forEach(([sid,logs])=>{
    logs.forEach(l=>{const s=MEMBERS.find(m=>m.id===sid);allLogs.push({...l,siteId:sid,siteName:s?.name||sid});});
  });
  allLogs.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const todoTasks=allTasks.filter(t=>t.status==='todo');
  const progTasks=allTasks.filter(t=>t.status==='progress');
  const waitTasks=allTasks.filter(t=>t.status==='waiting');
  const doneTasks=allTasks.filter(t=>t.status==='done');

  document.getElementById('crm-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="crm-view-toggle">

        <div class="crm-vt ${view==='list'?'active':''}" data-view="list" onclick="this.parentElement.querySelectorAll('.crm-vt').forEach(v=>v.classList.remove('active'));this.classList.add('active');renderCRM()">📃 Task List</div>
        <div class="crm-vt ${view==='log'?'active':''}" data-view="log" onclick="this.parentElement.querySelectorAll('.crm-vt').forEach(v=>v.classList.remove('active'));this.classList.add('active');renderCRM()">📜 Activity Log</div>
      </div>
      <button class="btn btn-cyan" onclick="openNewTask()">+ New Task</button>
    </div>

function openNewTask(){
  document.getElementById('task-modal-title').textContent='Add Task';
  document.getElementById('task-edit-id').value='';
  document.getElementById('task-title').value='';
  document.getElementById('task-pri').value='med';
  document.getElementById('task-status').value='todo';
  document.getElementById('task-due').value='';
  document.getElementById('task-cat').value='general';
  document.getElementById('task-assign').value='';
  document.getElementById('task-notes').value='';
  document.getElementById('task-del-btn').style.display='none';
  populateTaskSiteSelect('');
  openModal('task-modal');
}

function openTaskForSite(siteId){
  openNewTask();
  document.getElementById('task-site').value=siteId;
}

function populateTaskSiteSelect(val){
  const sel=document.getElementById('task-site');
  sel.innerHTML='<option value="">-- No specific stop --</option>'+
    myStops.map(s=>'<option value="'+s.id+'"'+(s.id===val?' selected':'')+'>'+esc(s.name)+' ('+s.state+')</option>').join('');
}

function editTask(id){
  const t=tasks.find(tk=>tk.id===id);if(!t)return;
  document.getElementById('task-modal-title').textContent='Edit Task';
  document.getElementById('task-edit-id').value=t.id;
  document.getElementById('task-title').value=t.title;
  document.getElementById('task-pri').value=t.priority;
  document.getElementById('task-status').value=t.status;
  document.getElementById('task-due').value=t.due||'';
  document.getElementById('task-cat').value=t.category||'general';
  document.getElementById('task-assign').value=t.assignedTo||'';
  document.getElementById('task-notes').value=t.notes||'';
  document.getElementById('task-del-btn').style.display='inline-block';
  populateTaskSiteSelect(t.siteId||'');
  openModal('task-modal');
}

function saveTask(){
  const title=document.getElementById('task-title').value.trim();
  if(!title){toast('Title required');return;}
  const editId=document.getElementById('task-edit-id').value;
  const obj={
    title,
    siteId:document.getElementById('task-site').value,
    priority:document.getElementById('task-pri').value,
    status:document.getElementById('task-status').value,
    due:document.getElementById('task-due').value,
    category:document.getElementById('task-cat').value,
    assignedTo:document.getElementById('task-assign').value,
    notes:document.getElementById('task-notes').value.trim(),
    updated:new Date().toISOString()
  };
  if(editId){
    const idx=tasks.findIndex(t=>t.id===editId);
    if(idx>-1)tasks[idx]={...tasks[idx],...obj};
  } else {
    obj.id='task_'+Date.now();
    obj.created=new Date().toISOString();
    tasks.push(obj);
  }
  saveData();closeModal('task-modal');renderCRM();renderDashboard();
  toast(editId?'Task updated':'Task added');
}

function deleteTask(){
  const id=document.getElementById('task-edit-id').value;
  if(!id||!confirm('Delete this task?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  saveData();closeModal('task-modal');renderCRM();renderDashboard();
  toast('Task deleted');
}

function quickStatus(id,newStatus){
  const t=tasks.find(tk=>tk.id===id);if(!t)return;
  t.status=newStatus;t.updated=new Date().toISOString();
  saveData();renderCRM();toast('Status: '+newStatus);
}

function addLog(siteId){
  document.getElementById('log-site-id').value=siteId;
  document.getElementById('log-dt').value=new Date().toISOString().slice(0,16);
  document.getElementById('log-subject').value='';
  document.getElementById('log-notes').value='';
  openModal('log-modal');
}
function saveLog(){
  const siteId=document.getElementById('log-site-id').value;
  const type=document.getElementById('log-type').value;
  const dt=document.getElementById('log-dt').value;
  const subject=document.getElementById('log-subject').value.trim();
  const notes=document.getElementById('log-notes').value.trim();
  if(!subject){toast('Subject required');return;}
  if(!activityLogs[siteId])activityLogs[siteId]=[];
  activityLogs[siteId].push({date:dt,type,subject,notes,id:'log_'+Date.now()});
  saveData();closeModal('log-modal');
  openSiteDrawer(siteId);renderCRM();renderDashboard();

}

function scheduleCall(siteId){
  document.getElementById('sched-site-id').value=siteId;
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('sched-date').value=tomorrow.toISOString().slice(0,10);
  document.getElementById('sched-time').value='09:00';
  document.getElementById('sched-contact').value='';
  document.getElementById('sched-purpose').value='';
  openModal('sched-modal');
}
function saveSchedule(){
  const siteId=document.getElementById('sched-site-id').value;
  const date=document.getElementById('sched-date').value;
  const time=document.getElementById('sched-time').value;
  const contact=document.getElementById('sched-contact').value.trim();

  scheduledCalls.push({siteId,date,time,contact,purpose,id:'sc_'+Date.now()});
  saveData();closeModal('sched-modal');renderCalendar();renderDashboard();
  toast('Call scheduled for '+date);

function addCritical(siteId){
  const reason=prompt('What needs immediate attention?');
  if(!reason)return;
  criticalItems.push({siteId,reason,created:new Date().toISOString(),id:'cr_'+Date.now()});
  saveData();renderCritical();renderDashboard();
  const badge=document.getElementById('crit-badge');
  badge.textContent=criticalItems.length;badge.style.display=criticalItems.length?'inline':'none';
  toast('Flagged as critical');
}

// ═══════════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════════
function renderCalendar(){
  const now=new Date();
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDay=first.getDay();
  const daysInMonth=last.getDate();
  const monthName=first.toLocaleString('default',{month:'long',year:'numeric'});

  // Get events for this month
  const monthCalls=scheduledCalls.filter(c=>{const d=new Date(c.date);return d.getMonth()===calMonth&&d.getFullYear()===calYear;});
  const callDays=new Set(monthCalls.map(c=>new Date(c.date).getDate()));

  let calHTML=`<div class="card"><div class="card-hd" style="justify-content:space-between">
    <span>📅 ${monthName}</span>
    <div style="display:flex;gap:6px">
      <button class="btn" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">&lt;</button>
      <button class="btn" onclick="calMonth=new Date().getMonth();calYear=new Date().getFullYear();renderCalendar()">Today</button>
      <button class="btn" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">&gt;</button>
    </div></div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>'<div class="cal-hd">'+d+'</div>').join('')}
  `;
  // Empty cells before first day
  for(let i=0;i<startDay;i++)calHTML+='<div class="cal-day other"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const isToday=(d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear());
    const hasCall=callDays.has(d);
    calHTML+=`<div class="cal-day${isToday?' today':''}">${d}${hasCall?'<span class="cal-dot dot-call"></span>':''}</div>`;
  }
  calHTML+='</div></div>';

  // Upcoming calls list
  const upcoming=scheduledCalls.filter(c=>new Date(c.date+'T'+c.time)>=new Date()).sort((a,b)=>new Date(a.date+'T'+a.time)-new Date(b.date+'T'+b.time));
  calHTML+=`<div class="card"><div class="card-hd">📞 Upcoming Scheduled Calls (${upcoming.length})</div>`;
  if(upcoming.length){
    calHTML+=upcoming.slice(0,20).map(c=>{
      const s=MEMBERS.find(m=>m.id===c.siteId);
      return `<div class="log-entry age-fresh" style="cursor:pointer" onclick="openSiteDrawer('${c.siteId}')">
        <span class="log-date">${c.date} ${c.time}</span>
        <span style="font-size:.78em;color:var(--cyan);margin-left:6px">${esc(s?.name||c.siteId)}</span>
        <div class="log-body">${c.contact?'<b>Contact:</b> '+esc(c.contact)+' · ':''}${esc(c.purpose||'')}</div>
      </div>`;
    }).join('');
  } else {
    calHTML+='<div style="padding:16px;text-align:center;color:var(--muted);font-size:.82em">No upcoming calls scheduled.</div>';
  }
  calHTML+='</div>';
  document.getElementById('cal-content').innerHTML=calHTML;
}

// CALCULATOR
// ═══════════════════════════════════════════════════════
function renderCalculator(){
  document.getElementById('calc-content').innerHTML=`
    <div class="card"><div class="card-hd">🧮 Cost & Profit Calculator</div>
      <div class="calc-grid">
        <div class="calc-input"><label>Pricing Model</label>
          <select id="calc-model" onchange="calculate()"><option value="retail-minus">Retail Minus</option><option value="cost-plus">Cost Plus</option></select>
        </div>
        <div class="calc-input"><label>Gallons / Month</label><input type="number" id="calc-gallons" value="5000" oninput="calculate()"></div>
        <div class="calc-input"><label>Retail Price ($/gal)</label><input type="number" id="calc-retail" value="3.899" step="0.001" oninput="calculate()"></div>
        <div class="calc-input"><label>Cost / Rack ($/gal)</label><input type="number" id="calc-cost" value="3.450" step="0.001" oninput="calculate()"></div>
        <div class="calc-input"><label>Discount Offered ($/gal)</label><input type="number" id="calc-discount" value="0.50" step="0.01" oninput="calculate()"></div>
        <div class="calc-input"><label>Processor Fee (%)</label><input type="number" id="calc-procfee" value="2.50" step="0.01" oninput="calculate()"></div>
      </div>
      <div class="calc-result" id="calc-result"></div>
    </div>
  `;
  calculate();
}
function calculate(){
  const model=document.getElementById('calc-model')?.value||'retail-minus';
  const gallons=parseFloat(document.getElementById('calc-gallons')?.value)||0;
  const retail=parseFloat(document.getElementById('calc-retail')?.value)||0;
  const cost=parseFloat(document.getElementById('calc-cost')?.value)||0;
  const discount=parseFloat(document.getElementById('calc-discount')?.value)||0;
  const procFee=(parseFloat(document.getElementById('calc-procfee')?.value)||0)/100;

  let sellPrice,margin,procCost,netPerGal,netTotal;
  if(model==='retail-minus'){
    sellPrice=retail-discount;
    margin=sellPrice-cost;
    procCost=sellPrice*procFee;
    netPerGal=margin-procCost;
  } else {
    sellPrice=cost+discount;
    margin=discount;
    procCost=sellPrice*procFee;
    netPerGal=margin-procCost;
  }
  netTotal=netPerGal*gallons;

  const el=document.getElementById('calc-result');if(!el)return;
  el.innerHTML=`
    <div class="cr-row"><span>Model</span><span class="cr-val">${model==='retail-minus'?'Retail Minus':'Cost Plus'}</span></div>
    <div class="cr-row"><span>Sell Price / gal</span><span class="cr-val">$${sellPrice.toFixed(3)}</span></div>
    <div class="cr-row"><span>Gross Margin / gal</span><span class="cr-val">$${margin.toFixed(3)}</span></div>
    <div class="cr-row"><span>Processor Fee / gal (${(procFee*100).toFixed(2)}%)</span><span class="cr-val" style="color:var(--red)">-$${procCost.toFixed(3)}</span></div>
    <div class="cr-row"><span>Net / gal</span><span class="cr-val" style="color:${netPerGal>=0?'var(--green)':'var(--red)'}">$${netPerGal.toFixed(3)}</span></div>
    <div class="cr-row total"><span>Net / Month (${gallons.toLocaleString()} gal)</span><span class="cr-val" style="color:${netTotal>=0?'var(--green)':'var(--red)'}">$${netTotal.toFixed(2)}</span></div>
    <div class="cr-row total"><span>Net / Year</span><span class="cr-val" style="color:${netTotal>=0?'var(--green)':'var(--red)'}">$${(netTotal*12).toFixed(2)}</span></div>
  `;
}

        <tbody>${noContact.map((s,i)=>`<tr class="clickable" onclick="openSiteDrawer('${s.id}')">
          <td class="num">${i+1}</td><td><b>${esc(s.name)}</b></td><td>${esc(s.city)}, ${s.state}</td>
          <td style="font-size:.78em">${esc(s.type)}</td><td style="font-size:.78em">${esc(s.phone)}</td>
          <td><button class="btn btn-cyan" onclick="event.stopPropagation();scheduleCall('${s.id}')" style="font-size:.7em;padding:3px 8px">📅 Schedule</button>
              <button class="btn btn-green" onclick="event.stopPropagation();addLog('${s.id}')" style="font-size:.7em;padding:3px 8px">📝 Log Call</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════
// CRITICAL ATTENTION
// ═══════════════════════════════════════════════════════
function renderCritical(){
  const badge=document.getElementById('crit-badge');
  badge.textContent=criticalItems.length;badge.style.display=criticalItems.length?'inline':'none';

  document.getElementById('crit-content').innerHTML=`
    <div class="card"><div class="card-hd">🚨 Critical Attention Items (${criticalItems.length})</div>
      ${criticalItems.length?criticalItems.map(c=>{
        const s=MEMBERS.find(m=>m.id===c.siteId);
        return `<div class="log-entry age-critical" style="cursor:pointer" onclick="openSiteDrawer('${c.siteId}')">
          <span class="log-date">${new Date(c.created).toLocaleString()}</span>
          <span style="font-size:.78em;color:var(--cyan);margin-left:6px">${esc(s?.name||c.siteId)}</span>
          <div class="log-body" style="font-size:.85em">${esc(c.reason)}</div>
          <button class="btn btn-red" onclick="event.stopPropagation();resolveCritical('${c.id}')" style="font-size:.68em;padding:2px 8px;position:absolute;top:8px;right:8px">Resolve</button>
        </div>`;
      }).join(''):'<div style="padding:30px;text-align:center;color:var(--muted)">No critical items. All clear! ✅</div>'}
    </div>
  `;
}
function resolveCritical(id){
  criticalItems=criticalItems.filter(c=>c.id!==id);saveData();renderCritical();renderDashboard();toast('Resolved');
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
initLogin();
</script>
