<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roady's GS Command Center</title>
<style>
:root{
  --bg:#0b0f19;--bg2:#111827;--bg3:#1a2236;--surface:#1e293b;
  --border:#2a3650;--border2:#334155;
  --text:#e2e8f0;--dim:#94a3b8;--muted:#64748b;
  --accent:#38bdf8;--cyan:#22d3ee;--green:#10b981;--yellow:#fbbf24;
  --red:#ef4444;--purple:#a78bfa;--orange:#fb923c;--pink:#f472b6;
  --ff:'Segoe UI',system-ui,-apple-system,sans-serif;
  --fm:'Cascadia Code','Fira Code',monospace;
}
body.light-mode{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--surface:#e2e8f0;
  --border:#cbd5e1;--border2:#94a3b8;
  --text:#0f172a;--dim:#475569;--muted:#64748b;
  /* Accent palette stays saturated so KPI/chart colors still pop */
}
body.light-mode select option{background:#ffffff;color:#0f172a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══ LOGIN SCREEN ═══ */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:380px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.login-logo{font-size:2em;font-weight:900;margin-bottom:4px;background:linear-gradient(135deg,var(--cyan),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:.78em;color:var(--muted);margin-bottom:28px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:20px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);transition:all .15s}
.pin-dot.filled{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,.4)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto}
.pin-key{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:1.2em;font-weight:700;color:var(--text);cursor:pointer;transition:all .1s;user-select:none}
.pin-key:hover{background:var(--surface);border-color:var(--accent)}
.pin-key:active{transform:scale(.95);background:var(--accent);color:var(--bg)}
.pin-key.fn{font-size:.75em;color:var(--muted)}
.login-error{color:var(--red);font-size:.78em;min-height:20px;margin-top:12px}

/* ═══ LAYOUT ═══ */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.topbar-logo{font-weight:900;font-size:1.1em;background:linear-gradient(135deg,var(--cyan),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-user{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-user .name{font-weight:700;font-size:.85em}
.topbar-user .role{font-size:.7em;color:var(--muted)}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:.8em;font-family:var(--ff);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-cyan{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.3);color:var(--cyan)}
.btn-green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.btn-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.btn-yellow{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:var(--yellow)}

/* GS SELECTOR (Manager only) */
.gs-selector-wrap{display:none;align-items:center;gap:8px}
.gs-selector-wrap.show{display:flex}
.gs-selector-wrap label{font-size:.7em;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;white-space:nowrap}
.gs-selector{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:.82em;font-family:var(--ff);min-width:180px;cursor:pointer}
.gs-selector:focus{outline:none;border-color:var(--cyan)}
.gs-selector:hover{border-color:var(--accent)}

/* TABS */
.tabs{display:flex;gap:2px;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:.82em;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab .badge{background:var(--red);color:#fff;font-size:.65em;padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:700}

/* PANELS */
.panel{display:none;padding:20px}
.panel.active{display:block}
.container{max-width:1400px;margin:0 auto}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card-hd{font-weight:800;font-size:.88em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.kpi-val{font-size:1.4em;font-weight:900}
.kpi-label{font-size:.7em;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.kpi.cyan .kpi-val{color:var(--cyan)}
.kpi.green .kpi-val{color:var(--green)}
.kpi.yellow .kpi-val{color:var(--yellow)}
.kpi.red .kpi-val{color:var(--red)}
.kpi.purple .kpi-val{color:var(--purple)}
.kpi.orange .kpi-val{color:var(--orange)}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.8em}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-weight:700;font-size:.75em;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(56,189,248,.03)}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:rgba(56,189,248,.06)}
.num{text-align:right;font-family:var(--fm);font-size:.85em}

/* SORTABLE TABLES */
table.sortable thead th{cursor:pointer;user-select:none}
table.sortable thead th[data-no-sort='1']{cursor:default}
table.sortable thead th .sort-chev{display:inline-block;margin-left:4px;font-size:.85em;opacity:.3;transition:opacity .15s,color .15s}
table.sortable thead th:hover .sort-chev{opacity:.6}
table.sortable thead th .sort-chev.active{opacity:1;color:var(--cyan)}
table.sortable thead th[data-no-sort='1'] .sort-chev{display:none}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-bar input,.search-bar select{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-size:.82em;font-family:var(--ff)}
.search-bar input{flex:1;min-width:200px}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:var(--accent)}

/* SITE DETAIL DRAWER */
#site-drawer{position:fixed;top:0;right:-520px;width:500px;max-width:92vw;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:200;transition:right .25s ease;overflow-y:auto;padding:20px;box-shadow:-5px 0 30px rgba(0,0,0,.4)}
#site-drawer.open{right:0}
.drawer-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:1.4em;cursor:pointer}
.drawer-close:hover{color:var(--red)}
.drawer-hd{font-size:1.1em;font-weight:900;margin-bottom:4px;padding-right:30px}
.drawer-sub{font-size:.78em;color:var(--muted);margin-bottom:14px}
.drawer-section{margin-top:16px}
.drawer-section h4{font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:8px}
.drawer-card{margin-top:14px;padding:12px;background:var(--bg3);border-radius:6px;border-left:3px solid var(--accent)}
.drawer-card.purple{border-left-color:var(--purple)}
.drawer-card.cyan{border-left-color:var(--cyan)}
.drawer-card.green{border-left-color:var(--green)}
.drawer-card-hd{font-size:.62em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.drawer-card.purple .drawer-card-hd{color:var(--purple)}
.drawer-card.cyan .drawer-card-hd{color:var(--cyan)}
.drawer-card.green .drawer-card-hd{color:var(--green)}
.drawer-card.amber{border-left-color:var(--yellow)}
.drawer-card.amber .drawer-card-hd{color:var(--yellow)}
.drawer-card.red{border-left-color:var(--red)}
.drawer-card.red .drawer-card-hd{color:var(--red)}
.opp-row{background:var(--bg);border-radius:4px;padding:6px 8px;font-size:.78em;cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:center}
.opp-row:hover{background:var(--bg3)}
.opp-savings{color:var(--yellow);font-weight:700;white-space:nowrap}
.roi-row{display:flex;justify-content:space-between;font-size:.84em;padding:3px 0}
.roi-row.subtotal{border-top:1px solid var(--border);margin-top:4px;padding-top:6px;font-weight:700}
.roi-row.net{border-top:2px solid var(--border);margin-top:8px;padding-top:8px;font-size:1em;font-weight:800}
.roi-row.net.positive{color:var(--green)}
.roi-row.net.negative{color:var(--red)}
.roi-row .label{color:var(--muted)}
.roi-row.net .label{color:var(--text)}
.roi-row.net.positive .value::after{content:" ✓";font-weight:800}
.roi-row.net.negative .value::after{content:" ✗";font-weight:800}
.roi-row.missing .value{color:var(--muted);font-style:italic}
.roi-foot{font-size:.66em;color:var(--muted);margin-top:8px;padding-top:6px;border-top:1px solid var(--border);line-height:1.5}
#stopdata-import-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
#stopdata-import-modal.show{display:flex}
.import-modal-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:600px;max-width:96vw;max-height:90vh;overflow:auto;padding:20px}
.import-preview-tbl{width:100%;border-collapse:collapse;font-size:.78em;margin-top:10px}
.import-preview-tbl th,.import-preview-tbl td{padding:4px 6px;border-bottom:1px solid var(--border);text-align:left}
.import-preview-tbl th{font-size:.66em;text-transform:uppercase;color:var(--muted)}
.fuel-tile-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fuel-tile{background:var(--bg);padding:10px;border-radius:5px}
.fuel-tile-lbl{font-size:.58em;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.fuel-tile-val{font-size:1.05em;font-weight:800;color:var(--text);margin-top:3px}
.fuel-tile-trend{font-size:.68em;margin-top:4px}
.fuel-tile-ytd{font-size:.6em;color:var(--muted);margin-top:2px}
.trend-up{color:var(--green)}
.trend-down{color:var(--red)}
.stop-search-wrap{position:relative;flex:0 0 240px}
.stop-search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:.82em}
.stop-search-input:focus{outline:none;border-color:var(--cyan)}
.stop-search-results{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;max-height:300px;overflow-y:auto;z-index:300;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.stop-search-results.show{display:block}
.stop-search-row{padding:8px 10px;cursor:pointer;font-size:.82em;border-bottom:1px solid var(--border)}
.stop-search-row:last-child{border-bottom:0}
.stop-search-row:hover,.stop-search-row.active{background:var(--bg3)}
.stop-search-row .ssn{font-weight:700}
.stop-search-row .sss{font-size:.72em;color:var(--muted);margin-left:6px}
.mystops-table{width:100%;border-collapse:collapse;font-size:.82em}
.mystops-table th{text-align:left;padding:6px 8px;font-size:.7em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg3);cursor:pointer;user-select:none}
.mystops-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.mystops-table tr:hover td{background:var(--bg3)}
.mystops-table tr.clickable{cursor:pointer}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-item{font-size:.78em;padding:6px 8px;background:var(--bg3);border-radius:5px}
.info-item .lbl{color:var(--muted);font-size:.85em}
.info-item .val{font-weight:700;margin-top:1px}

/* CRM LOG */
.log-entry{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}
.log-entry .log-date{font-size:.72em;color:var(--muted);font-family:var(--fm)}
.log-entry .log-type{font-size:.68em;padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block;margin-left:6px}
.log-entry .log-body{font-size:.82em;margin-top:4px;line-height:1.5}
.type-call{background:rgba(34,211,238,.15);color:var(--cyan)}
.type-task{background:rgba(251,191,36,.15);color:var(--yellow)}
.type-note{background:rgba(148,163,184,.15);color:var(--dim)}
.type-urgent{background:rgba(239,68,68,.15);color:var(--red)}
.type-followup{background:rgba(16,185,129,.15);color:var(--green)}

/* AGING COLORS */
.age-fresh{border-left:3px solid var(--green)}
.age-warm{border-left:3px solid var(--yellow)}
.age-stale{border-left:3px solid var(--orange)}
.age-critical{border-left:3px solid var(--red)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-hd{font-size:.65em;text-align:center;color:var(--muted);padding:4px;font-weight:700}
.cal-day{text-align:center;padding:6px 2px;font-size:.75em;border-radius:4px;min-height:36px;cursor:pointer;position:relative}
.cal-day:hover{background:var(--bg3)}
.cal-day.today{background:rgba(34,211,238,.1);color:var(--cyan);font-weight:700}
.cal-day.other{color:var(--border2)}
.cal-day .cal-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0;display:block}
.cal-day .cal-dot.dot-call{background:var(--cyan)}
.cal-day .cal-dot.dot-task{background:var(--yellow)}
.cal-day .cal-dot.dot-urgent{background:var(--red)}

/* RATES TABLE */
.rate-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
@media(max-width:1200px){.rate-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1000px){.rate-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.rate-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.rate-grid{grid-template-columns:1fr}}
.rate-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:2px;min-height:64px}
.rate-grid .rate-card{margin-bottom:0}
.rate-card .proc{font-weight:800;font-size:.85em;margin-bottom:2px;line-height:1.2}
.rate-card .rate{font-size:.78em;color:var(--cyan);font-family:var(--fm)}
.rate-card .note{font-size:.7em;color:var(--muted);margin-top:2px;line-height:1.3}

/* CALCULATOR */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.calc-input{display:flex;flex-direction:column;gap:4px}
.calc-input label{font-size:.72em;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.calc-input input,.calc-input select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--fm);font-size:.9em}
.calc-input input:focus,.calc-input select:focus{outline:none;border-color:var(--cyan)}
.calc-result{background:linear-gradient(135deg,rgba(34,211,238,.05),rgba(16,185,129,.05));border:1px solid rgba(34,211,238,.2);border-radius:10px;padding:16px;margin-top:12px}
.calc-result .cr-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.85em}
.calc-result .cr-row.total{font-weight:900;font-size:1em;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.calc-result .cr-val{font-family:var(--fm);color:var(--cyan)}

/* COMPREHENSIVE CALCULATOR (Phase 4) */
.calc-scenario-hd{display:grid;grid-template-columns:2fr 2fr 1fr;gap:10px;margin-bottom:14px}
.calc-models{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:1100px){.calc-models{grid-template-columns:1fr}}
.calc-model{background:var(--bg2);border:2px solid var(--border);border-radius:10px;padding:14px}
.calc-model.retail{border-color:rgba(34,211,238,.3)}
.calc-model.costplus{border-color:rgba(167,139,250,.3)}
.calc-model-hd{font-weight:900;font-size:1em;text-align:center;padding:8px;margin:-14px -14px 12px -14px;border-radius:8px 8px 0 0}
.calc-model.retail .calc-model-hd{background:rgba(34,211,238,.1);color:var(--cyan)}
.calc-model.costplus .calc-model-hd{background:rgba(167,139,250,.1);color:var(--purple)}
.calc-section{margin-bottom:10px;border:1px solid var(--border);border-radius:8px;padding:10px;background:var(--bg3)}
.calc-section-hd{font-weight:800;font-size:.78em;color:var(--accent);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.calc-section-sub{font-size:.7em;color:var(--muted);font-weight:500;margin-left:6px;text-transform:none;letter-spacing:0}
.calc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;align-items:end}
.calc-cell{display:flex;flex-direction:column;gap:3px;min-width:0}
.calc-cell label{font-size:.62em;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;line-height:1.25;min-height:2em}
.calc-cell input{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:6px 8px;color:var(--text);font-family:var(--fm);font-size:.82em;text-align:right;min-width:0;width:100%}
.calc-cell input:focus{outline:none;border-color:var(--cyan)}
.calc-cell.input input{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.3)}
.calc-cell.output input{background:transparent;border-color:transparent;color:var(--cyan);font-weight:700;font-style:italic;cursor:default}
.calc-total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:linear-gradient(135deg,rgba(34,211,238,.08),rgba(16,185,129,.08));border:1px solid rgba(34,211,238,.3);border-radius:8px;margin-top:10px}
.calc-total-row .lbl{font-weight:800;font-size:.85em;line-height:1.3}
.calc-total-row .val{font-family:var(--fm);font-size:1.25em;font-weight:900;color:var(--cyan);white-space:nowrap}
.calc-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.calc-line-row{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr auto;gap:4px;margin-top:4px;align-items:center}
.calc-line-row input[type="text"]{background:rgba(148,163,184,.06);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:.78em;font-family:var(--ff)}
.calc-line-row input[type="number"]{background:rgba(251,191,36,.04);border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);font-family:var(--fm);font-size:.78em;text-align:right}
.calc-line-row input:focus{outline:none;border-color:var(--cyan)}
.calc-line-del{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:.78em;line-height:1}
.calc-line-del:hover{background:rgba(239,68,68,.2)}
.calc-add-line{background:transparent;border:1px dashed var(--border2);color:var(--muted);border-radius:4px;padding:4px 10px;font-size:.7em;cursor:pointer;margin-top:6px;font-family:var(--ff)}
.calc-add-line:hover{border-color:var(--cyan);color:var(--cyan)}

/* FORM */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:.72em;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--ff);font-size:.85em}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--cyan)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:8px;font-size:.82em;font-weight:600;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;width:500px;max-width:92vw;max-height:85vh;overflow-y:auto}
.modal h3{font-size:1em;font-weight:800;margin-bottom:14px}

@media(max-width:768px){
  .panel{padding:12px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .calc-grid{grid-template-columns:1fr}
  .tabs{padding:0 8px}
  .tab{padding:8px 12px;font-size:.75em}
}

/* ═══ TERRITORY MAP ═══ */
.ter-map-wrap{position:relative;margin-bottom:16px}
.us-map{width:100%;max-width:900px;margin:0 auto;display:block}
.gs-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.gs-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;border-left:4px solid var(--muted)}
.gs-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.gs-card .gs-name{font-weight:900;font-size:.92em;margin-bottom:2px}
.gs-card .gs-region{font-size:.72em;color:var(--muted);margin-bottom:8px}
.gs-card .gs-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gs-card .gs-stat{text-align:center}
.gs-card .gs-stat-val{font-weight:800;font-size:1.05em}
.gs-card .gs-stat-lbl{font-size:.62em;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ter-sub-tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--bg3);border-radius:8px;padding:3px;width:fit-content}
.ter-sub-tab{padding:7px 16px;border-radius:6px;font-size:.78em;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.ter-sub-tab:hover{color:var(--text)}
.ter-sub-tab.active{background:var(--accent);color:var(--bg);font-weight:700}
.state-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.state-pill{background:var(--bg);padding:2px 7px;border-radius:4px;font-size:.68em;font-weight:700;color:var(--dim);border:1px solid var(--border)}

/* ═══ CRM ENHANCED ═══ */
.task-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.task-col{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;min-height:200px}
.task-col-hd{font-weight:800;font-size:.82em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.task-col-hd .col-count{background:var(--bg);padding:1px 7px;border-radius:10px;font-size:.78em;color:var(--muted)}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.task-item:hover{border-color:var(--accent);background:rgba(56,189,248,.03)}
.task-item .task-title{font-weight:700;font-size:.82em;margin-bottom:3px}
.task-item .task-meta{font-size:.7em;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.task-item .task-site{font-size:.72em;color:var(--cyan)}
.task-pri-high{border-left:3px solid var(--red)}
.task-pri-med{border-left:3px solid var(--yellow)}
.task-pri-low{border-left:3px solid var(--green)}
.task-status{font-size:.65em;padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block}
.ts-todo{background:rgba(148,163,184,.15);color:var(--dim)}
.ts-progress{background:rgba(34,211,238,.15);color:var(--cyan)}
.ts-waiting{background:rgba(251,191,36,.15);color:var(--yellow)}
.ts-done{background:rgba(16,185,129,.15);color:var(--green)}
.crm-view-toggle{display:flex;gap:2px;background:var(--bg3);border-radius:6px;padding:2px;width:fit-content}
.crm-vt{padding:5px 12px;border-radius:4px;font-size:.75em;font-weight:600;color:var(--muted);cursor:pointer}
.crm-vt.active{background:var(--accent);color:var(--bg)}

<div id="login-screen">

  </div>
</div>

<!-- ═══ MAIN APP ═══ -->

// Manager dropdown selection. Non-manager users always read their own
// namespace; managers default to "All GS" (rollup) but can drill into
// any specific GS via the topbar selector.
const ALL_GS = 'All GS';
let managerSelection = null;

function getActiveGS(){
  // GS name string (a REGIONS key) when scoped to one GS;
  // null in Manager All-GS mode (or when no one is logged in).
  if(!currentUser) return null;
  if(!currentUser.isManager) return currentUser.name;
  return managerSelection && managerSelection !== ALL_GS ? managerSelection : null;
}

function isAllGSMode(){
  return !!(currentUser && currentUser.isManager && (!managerSelection || managerSelection === ALL_GS));
}

function gsKey(suffix){
  // Use only when scoped to one GS. In All-GS mode, callers should
  // walk every namespace via forEachGS instead.
  const active = getActiveGS();
  if(!active) throw new Error('gsKey() called in All-GS mode — use forEachGS() instead');
  return LS_KEY + active + '_' + suffix;
}

function forEachGS(fn){
  // Iterates REGIONS keys; fn receives (gsName, ns) where
  // ns(suffix) returns gs_cmd_<gsName>_<suffix>.
  for(const gsName of Object.keys(REGIONS)){
    fn(gsName, suffix => LS_KEY + gsName + '_' + suffix);
  }
}

function stopsForGS(gsName){
  const r = REGIONS[gsName];
  if(!r) return [];
  return MEMBERS.filter(m => m.status==='active' && m.group!=='None' && r.states.includes(m.state));
}

function recomputeMyStops(){
  if(!currentUser){ myStops = []; return; }
  if(isAllGSMode()){
    myStops = MEMBERS.filter(m => m.status==='active' && m.group!=='None');
  } else {
    const active = getActiveGS();
    myStops = active ? stopsForGS(active) : [];
  }
}

// Cross-app reads: roadys_fuel / roadys_kpi / roadys_vp_enroll are
// written by index.html; we read them here. Logs a warning on shape
// mismatch so a schema change there shows up in the console instead
// of silently breaking dashboards.
function loadShared(key){
  try {
    const raw = localStorage.getItem(key);
    if(!raw) return null;
    const v = JSON.parse(raw);
    if(v !== null && typeof v !== 'object'){
      console.warn('loadShared: unexpected shape for ' + key + ' (got ' + typeof v + ')');
      return null;
    }
    return v;
  } catch(e){
    console.warn('loadShared: parse error for ' + key + ': ' + e.message);
    return null;
  }
}

function loadVendorMaster(){
  // Returns {VP_VENDORS, progDetails, _ts}.
  // Prefer the localStorage bridge written by vendors.html on its load;
  // fall back to inlined VP_VENDORS_INLINE / PROG_DETAILS_INLINE so the
  // drawer renders names even before vendors.html has been opened.
  try {

    if (cached && Array.isArray(cached.VP_VENDORS)) {
      return {
        VP_VENDORS: cached.VP_VENDORS,
        progDetails: Array.isArray(cached.progDetails) ? cached.progDetails : PROG_DETAILS_INLINE,
        _ts: typeof cached._ts === 'number' ? cached._ts : 0

    }
  } catch(e){}
  return { VP_VENDORS: VP_VENDORS_INLINE, progDetails: PROG_DETAILS_INLINE, _ts: 0 };
}

function currentMonthKey(){
  // Matches index.html's GD/KD period keys exactly.
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function fuelStatsForStops(stops){
  // GD[stopId][periodKey] = { gallons, aggregators, fleets, rack }.
  // We only sum the .gallons number — the structured aggregator/fleet
  // detail is owned by the Fuelman page in index.html.
  const GD = loadFuelGD();
  const month = currentMonthKey();
  const yearPrefix = month.slice(0,4) + '-';
  let mtd = 0, ytd = 0, active = 0;
  const perStop = [];
  for(const s of stops){
    const stopData = GD[s.id];
    if(!stopData) continue;
    const cur = (stopData[month]?.gallons) || 0;
    if(cur > 0) active++;
    mtd += cur;
    let stopYtd = 0;
    for(const k in stopData){
      if(k.startsWith(yearPrefix)) stopYtd += (stopData[k]?.gallons || 0);
    }
    ytd += stopYtd;
    if(cur > 0 || stopYtd > 0){
      perStop.push({ id: s.id, name: s.name, city: s.city, state: s.state, mtd: cur, ytd: stopYtd });
    }
  }
  perStop.sort((a,b) => b.mtd - a.mtd);
  return { mtd, ytd, active, avg: active ? mtd/active : 0, perStop, hasData: Object.keys(GD).length > 0 };
}

function rewardsStatsNetwork(){
  // KD['Rewards Revenue'][periodKey] = number. Network-level only —
  // there is no per-stop or per-territory decomposition in source data,
  // so this returns one figure that's the same for every territory view.
  const KD = loadKpiKD();
  const month = currentMonthKey();
  const yearPrefix = month.slice(0,4) + '-';
  const series = KD['Rewards Revenue'] || {};
  const mtd = series[month] || 0;
  let ytd = (KD['Rewards Revenue YTD']||{})[month];
  if(typeof ytd !== 'number'){
    ytd = 0;
    for(const k in series){ if(k.startsWith(yearPrefix)) ytd += (series[k] || 0); }
  }
  return { mtd, ytd, hasData: Object.keys(KD).length > 0 };
}

function vendorStatsForStops(stops){
  // VP_ENROLL[stopId][vendorId] = boolean. Phase 2 added the vendor master
  // bridge (loadVendorMaster), so each topVendors[] entry now also gets
  // .name and .program attached for display in the Per-GS Vendor card.
  const VPE = loadVendorEnrolls();
  let totalEnrollments = 0, stopsEnrolled = 0;
  const byVendor = {};
  for(const s of stops){
    const stopVP = VPE[s.id];
    if(!stopVP || typeof stopVP !== 'object') continue;
    let stopHas = false;
    for(const [vid, on] of Object.entries(stopVP)){
      if(on){
        totalEnrollments++;
        byVendor[vid] = (byVendor[vid]||0) + 1;
        stopHas = true;
      }
    }
    if(stopHas) stopsEnrolled++;
  }
  const topVendors = Object.entries(byVendor)
    .sort((a,b) => b[1] - a[1])
    .slice(0,10)
    .map(([id, count]) => ({ id, count }));
  // Attach display names from the vendor master (Phase 2)
  const _master = loadVendorMaster();
  topVendors.forEach(t => { const v = vendorById(t.id, _master); t.name = v ? v.name : t.id; t.program = v ? v.program : ''; });
  return { totalEnrollments, stopsEnrolled, topVendors, hasData: Object.keys(VPE).length > 0 };
}

  try{scheduledCalls=JSON.parse(localStorage.getItem(k+'_sched')||'[]');}catch(e){scheduledCalls=[];}

  const active = getActiveGS();

  localStorage.setItem(k+'_sched',JSON.stringify(scheduledCalls));
  localStorage.setItem(k+'_extras',JSON.stringify(siteExtras));
  localStorage.setItem(k+'_critical',JSON.stringify(criticalItems));
  localStorage.setItem(k+'_tasks',JSON.stringify(tasks));

// ═══════════════════════════════════════════════════════
// SORTABLE TABLES (Phase 5-1)
// ═══════════════════════════════════════════════════════
// Single shared helper. Each known table gets an id; applySortability()
// walks every entry in SORTABLE_TABLES and instruments any that are
// currently in the DOM. Sort state per table persists in
// localStorage['gs_cmd_sort_<key>'] so a refresh keeps the user's
// chosen sort. Re-rendering a table replaces its DOM node — the helper
// always re-applies saved state to the fresh rows.
const SORTABLE_TABLES = {
  'tbl-territory':       'territory',
  'tbl-scenarios':       'scenarios',
  'tbl-crm-tasks':       'crm-tasks',
  'tbl-fuel-intro':      'fuel-intro',
  'tbl-master-critical': 'master-critical',
  'tbl-rates-cross':     'rates-cross',
  'mystops-tbl':         'mystops'
};

function readCellValue(cell){
  const text = (cell.textContent || '').trim();
  if(!text) return '';
  // Numeric — strip $, commas, %, plus/minus stays
  const num = text.replace(/[$,\s]/g, '').replace(/%$/, '');
  if(/^-?\d+(\.\d+)?$/.test(num)) return parseFloat(num);
  // Date — ISO or ISO-like (YYYY-MM-DD or "M/D/YYYY")
  if(/^\d{4}-\d{2}-\d{2}/.test(text) || /^\d{1,2}\/\d{1,2}\/\d{2,4}/.test(text)){
    const t = Date.parse(text);
    if(!isNaN(t)) return t;
  }
  return text.toLowerCase();
}

function compareCells(a, b, dir){
  const av = readCellValue(a);
  const bv = readCellValue(b);
  const sign = dir === 'desc' ? -1 : 1;
  // Comparing numeric to string falls through to JS coercion which
  // always says "string < number" — fine for our purposes.
  if(av < bv) return -sign;
  if(av > bv) return sign;
  return 0;
}

function loadSortState(id){
  try { return JSON.parse(localStorage.getItem('gs_cmd_sort_' + id) || 'null'); }
  catch(e){ return null; }
}
function saveSortState(id, s){
  try { localStorage.setItem('gs_cmd_sort_' + id, JSON.stringify(s)); } catch(e){}
}
function clearSortState(id){
  try { localStorage.removeItem('gs_cmd_sort_' + id); } catch(e){}
}

function sortTableRows(tableEl, col, dir){
  const tbody = tableEl.querySelector('tbody');
  if(!tbody) return;
  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((rA, rB) => {
    const a = rA.children[col];
    const b = rB.children[col];
    if(!a || !b) return 0;
    return compareCells(a, b, dir);
  });
  for(const r of rows) tbody.appendChild(r);
}

function paintSortIndicator(tableEl, col, dir){
  tableEl.querySelectorAll('thead th .sort-chev').forEach(c => {
    c.textContent = '⇅';
    c.classList.remove('active');
  });
  if(col >= 0 && dir){
    const th = tableEl.querySelectorAll('thead th')[col];
    const c = th && th.querySelector('.sort-chev');
    if(c){
      c.textContent = dir === 'asc' ? '▲' : '▼';
      c.classList.add('active');
    }
  }
}

function cycleSort(tableEl, tableId, col){
  const saved = loadSortState(tableId);
  let next;
  if(!saved || saved.col !== col)      next = { col, dir: 'asc' };
  else if(saved.dir === 'asc')         next = { col, dir: 'desc' };
  else                                 next = null; // tri-state: asc → desc → unsorted
  if(next){
    saveSortState(tableId, next);
    sortTableRows(tableEl, next.col, next.dir);
    paintSortIndicator(tableEl, next.col, next.dir);
  } else {
    clearSortState(tableId);
    paintSortIndicator(tableEl, -1, null);
    // Note: "unsorted" can't restore the original render order without
    // re-rendering; the rows stay in their last-sorted order. Acceptable
    // tri-state UX — the user can pick another column or another direction.
  }
}

function makeTableSortable(tableEl, tableId){
  if(!tableEl) return;
  tableEl.classList.add('sortable');
  // Attach handlers + chevron span once per table DOM node. Rendered
  // tables get fresh nodes, so dataset.sortInit resets correctly.
  if(tableEl.dataset.sortInit !== '1'){
    tableEl.dataset.sortInit = '1';
    const ths = tableEl.querySelectorAll('thead th');
    ths.forEach((th, idx) => {
      if(th.dataset.noSort === '1') return;
      if(!th.querySelector('.sort-chev')){
        const chev = document.createElement('span');
        chev.className = 'sort-chev';
        chev.textContent = '⇅';
        th.appendChild(chev);
      }
      th.onclick = () => cycleSort(tableEl, tableId, idx);
    });
  }
  // Always re-apply saved sort to the current rows — tbody contents
  // can change without the table element being replaced.
  const saved = loadSortState(tableId);
  if(saved){
    sortTableRows(tableEl, saved.col, saved.dir);
    paintSortIndicator(tableEl, saved.col, saved.dir);
  } else {
    paintSortIndicator(tableEl, -1, null);
  }
}

function applySortability(){
  for(const [domId, sortKey] of Object.entries(SORTABLE_TABLES)){
    const el = document.getElementById(domId);
    if(el) makeTableSortable(el, sortKey);
  }
}

  if(days===0)return '<span style="color:var(--green)">Today</span>';

// Aggregates rollup metrics for one GS by walking that GS's localStorage
// namespace. Used by the Manager All-GS dashboard. Tolerant to missing
// or malformed namespaces — those simply yield zeros.
function gsRollupStats(gsName){
  const region = REGIONS[gsName];
  if(!region) return null;
  const stops = stopsForGS(gsName);
  const ns = suffix => LS_KEY + gsName + '_' + suffix;

  let logs = {};
  try { logs = JSON.parse(localStorage.getItem(ns('logs')) || '{}') || {}; } catch(e){}
  const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
  let recentLogs = 0;
  for(const arr of Object.values(logs)){
    if(!Array.isArray(arr)) continue;
    for(const l of arr){
      const t = l && l.date ? new Date(l.date).getTime() : 0;
      if(t >= cutoff) recentLogs++;
    }
  }

  let critical = [];
  try { critical = JSON.parse(localStorage.getItem(ns('critical')) || '[]') || []; } catch(e){}
  if(!Array.isArray(critical)) critical = [];

  let scenarios = [];
  try { scenarios = JSON.parse(localStorage.getItem(ns('scenarios')) || '[]') || []; } catch(e){}
  if(!Array.isArray(scenarios)) scenarios = [];

  let totalRetail = 0, totalCostPlus = 0;
  for(const scn of scenarios){
    if(scn && scn.retail)   totalRetail   += calcSide(scn.retail).totalNewRevenue;
    if(scn && scn.costPlus) totalCostPlus += calcSide(scn.costPlus).totalNewRevenue;
  }

  return {
    gsName, region, stops,
    stopsCount: stops.length,
    roadys: stops.filter(s => s.group==="Roady's").length,
    ptp:    stops.filter(s => s.group==='PTP').length,
    recentLogs,
    criticalCount: critical.length,
    criticalItems: critical,
    scenariosCount: scenarios.length,
    totalRetail, totalCostPlus,
    bestPotential: Math.max(totalRetail, totalCostPlus)
  };
}

function renderMasterDashboard(){

  let totalCritical = 0;
  let totalRecentLogs = 0;
  const allCritical = [];
  const allActivity = [];

  forEachGS((gsName, ns) => {
    const stats = gsRollupStats(gsName);
    if(!stats) return;
    allByGS[gsName]        = stats;
    totalScenariosCount   += stats.scenariosCount;
    totalRetailPotential  += stats.totalRetail;
    totalCostPlusPotential += stats.totalCostPlus;
    totalCritical         += stats.criticalCount;
    totalRecentLogs       += stats.recentLogs;
    stats.criticalItems.forEach(c => allCritical.push({ ...c, _gs: gsName }));
    let logs = {};
    try { logs = JSON.parse(localStorage.getItem(ns('logs')) || '{}') || {}; } catch(e){}

function filterTerritory(){
  const q=(document.getElementById('ter-search')?.value||'').toLowerCase();
  const tf=document.getElementById('ter-type')?.value||'';
  const gf=document.getElementById('ter-group')?.value||'';
  const sf=document.getElementById('ter-state')?.value||'';
  let d=myStops.filter(s=>{
    if(q&&!s.name.toLowerCase().includes(q)&&!s.city.toLowerCase().includes(q)&&!s.state.toLowerCase().includes(q)&&!s.id.toLowerCase().includes(q)&&!(s.company||'').toLowerCase().includes(q))return false;
    if(tf&&s.type!==tf)return false;

    if(sf&&s.state!==sf)return false;
    return true;

  tb.innerHTML=d.map((s,i)=>{
    const lc=getLastContact(s.id);
    const days=ageDays(lc?.date);

    return `<tr class="clickable ${ageClass(days)}" onclick="openSiteDrawer('${s.id}')">
      <td class="num" style="color:var(--dim)">${i+1}</td>
      <td style="font-size:.75em;color:var(--muted)">${esc(s.id)}</td>
      <td><b>${esc(s.name)}</b></td>
      <td>${esc(s.city)}, ${s.state}</td>

      <td style="white-space:nowrap"><button class="btn btn-cyan" onclick="event.stopPropagation();scheduleCall('${s.id}')" style="font-size:.7em;padding:3px 8px">📅</button>
          <button class="btn btn-green" onclick="event.stopPropagation();addLog('${s.id}')" style="font-size:.7em;padding:3px 8px">📝</button>

    </tr>`;
  }).join('');
  applySortability();
}

function scenariosForStop(siteId){
  // GS mode: read this GS's namespace. Manager All-GS: walk every GS
  // namespace and tag each scenario with its source GS so the drawer
  // can show provenance.
  if(isAllGSMode()){
    const all = [];
    forEachGS((gsName, ns) => {
      try {
        const arr = JSON.parse(localStorage.getItem(ns('scenarios')) || '[]');
        if(Array.isArray(arr)) arr.forEach(scn => { if(scn && scn.stopId === siteId) all.push({ ...scn, _gs: gsName }); });
      } catch(e){}
    });
    return all;
  }
  const active = getActiveGS();
  if(!active) return [];
  try {
    const arr = JSON.parse(localStorage.getItem(LS_KEY + active + '_scenarios') || '[]');
    return Array.isArray(arr) ? arr.filter(scn => scn && scn.stopId === siteId) : [];
  } catch(e){ return []; }
}

function openCalcScenarioFromDrawer(scnId, gsName){
  closeDrawer();
  const tabEl = document.querySelector('[data-tab="calculator"]');
  switchTab('calculator', tabEl);
  // openScenario in All-GS mode prompts to switch GS; in GS mode it
  // just loads the scenario into the editor.
  if(gsName) openScenario(scnId, gsName);
  else openScenario(scnId);
}

// ─── Stop Deep-Dive helpers (Phase 1) ────────────────────────────────
function stopFleetGallons(stopId, m){
  try {
    const GD = loadFuelGD();
    const fl = GD[stopId]?.[m]?.fleets;
    if(!Array.isArray(fl)) return 0;
    return fl.reduce((s,f)=>s+(+f.gallons||0),0);
  } catch(e){ return 0; }
}
function stopAggregatorGallons(stopId, m){
  try {
    const GD = loadFuelGD();
    const ag = GD[stopId]?.[m]?.aggregators;
    if(!Array.isArray(ag)) return 0;
    return ag.reduce((s,a)=>s+(+a.gallons||0),0);
  } catch(e){ return 0; }
}
function stopTotalGallons(stopId, m){
  try {
    const GD = loadFuelGD();
    return +(GD[stopId]?.[m]?.gallons||0);
  } catch(e){ return 0; }
}
function fmtTrendPill(curr, prior, label){
  if(!prior || prior <= 0) return '<span style="color:var(--muted)">— '+label+'</span>';
  const delta = ((curr - prior) / prior) * 100;
  const sign = delta >= 0 ? '▲' : '▼';
  const cls = delta >= 0 ? 'trend-up' : 'trend-down';
  return '<span class="'+cls+'">'+sign+' '+Math.abs(delta).toFixed(1)+'% '+label+'</span>';
}
function priorMonthKey(m){
  const [y,mo] = m.split('-').map(Number);
  const d = new Date(y, mo-2, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function priorYearMonthKey(m){
  const [y,mo] = m.split('-').map(Number);
  return (y-1) + '-' + String(mo).padStart(2,'0');
}
function ytdGallonsForStop(stopId, m, kind /* 'total'|'fleet'|'agg' */){
  const [y, mo] = m.split('-').map(Number);
  let sum = 0;
  for(let i = 1; i <= mo; i++){
    const k = y + '-' + String(i).padStart(2,'0');
    if(kind === 'fleet') sum += stopFleetGallons(stopId, k);
    else if(kind === 'agg') sum += stopAggregatorGallons(stopId, k);
    else sum += stopTotalGallons(stopId, k);
  }
  return sum;
}
function loadStopRecord(stopId){
  if(!stopdata[stopId]) stopdata[stopId] = {membershipCost:'', siteMgrName:'', siteMgrEmail:'', siteMgrPhone:'', notes:[], visits:[]};
  return stopdata[stopId];
}
function saveStopRecord(stopId, partial){
  const rec = loadStopRecord(stopId);
  Object.assign(rec, partial);
  saveData();
}

function onStopSearchKey(ev){
  const box = document.getElementById('stop-search-results');
  if(!box || !box.classList.contains('show')) return;
  const rows = Array.from(box.querySelectorAll('.stop-search-row[data-sid]'));
  if(!rows.length) return;
  let idx = rows.findIndex(r => r.classList.contains('active'));
  if(idx < 0) idx = 0;
  if(ev.key === 'ArrowDown'){ ev.preventDefault(); rows[idx]?.classList.remove('active'); idx = (idx+1)%rows.length; rows[idx].classList.add('active'); }
  else if(ev.key === 'ArrowUp'){ ev.preventDefault(); rows[idx]?.classList.remove('active'); idx = (idx-1+rows.length)%rows.length; rows[idx].classList.add('active'); }
  else if(ev.key === 'Enter'){ ev.preventDefault(); const sid = rows[idx]?.dataset.sid; if(sid) onStopSearchPick(sid); }
  else if(ev.key === 'Escape'){ closeStopSearch(); }
}

// ─── Phase 3 helpers: Value Prop sync ────────────────────────────────
let _vpCache = null;
async function loadValueProps(){
  if(_vpCache) return _vpCache;
  try {
    const url = ROADYS_SB_URL + '/rest/v1/value_props?select=*&status=eq.active';
    const resp = await fetch(url, {
      headers:{'apikey':ROADYS_SB_ANON,'Authorization':'Bearer '+ROADYS_SB_ANON,'Accept':'application/json'}
    });
    if(!resp.ok) return null;
    _vpCache = await resp.json();
    return _vpCache;
  } catch(e){ return null; }
}
function valuePropForStop(stop){
  if(!_vpCache || !stop) return null;
  const sCity = (stop.city||'').toLowerCase().trim();
  const sState = (stop.state||'').toLowerCase().trim();
  if(!sCity || !sState) return null;
  return _vpCache.find(vp =>
    (vp.city||'').toLowerCase().trim() === sCity &&
    (vp.state||'').toLowerCase().trim() === sState
  ) || null;
}
function relativeAge(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return '—';
  const ms = Date.now() - d.getTime();
  const days = Math.floor(ms / 86400000);
  if(days < 1) return 'today';
  if(days < 7) return days + 'd ago';
  if(days < 30) return Math.floor(days/7) + 'w ago';
  if(days < 365) return Math.floor(days/30) + 'mo ago';
  return Math.floor(days/365) + 'y ago';
}

// ─── Phase 3 helpers: Vendor opportunity ──────────────────────────────
function parseAvgSavings(text){
  if(!text) return 0;
  const m = String(text).match(/\$\s*([\d,]+(?:\.\d+)?)\s*\/\s*mo/i);
  return m ? parseFloat(m[1].replace(/,/g,'')) : 0;
}
function vendorSavingsForStop(stopId){
  const VPE = loadVendorEnrolls();
  const stopVP = VPE[stopId];
  if(!stopVP || typeof stopVP !== 'object') return 0;
  const master = loadVendorMaster();
  let sum = 0;
  for(const [vid, on] of Object.entries(stopVP)){
    if(!on) continue;
    const c = master.progDetails.find(p => p.vid === vid);
    if(c) sum += parseAvgSavings(c.avgSavings);
  }
  return sum;
}
function vendorOpportunityForStop(stopId){
  const VPE = loadVendorEnrolls();
  const enrolled = new Set();
  const stopVP = VPE[stopId];
  if(stopVP && typeof stopVP === 'object'){
    for(const [vid, on] of Object.entries(stopVP)){ if(on) enrolled.add(vid); }
  }
  const master = loadVendorMaster();
  const list = master.VP_VENDORS
    .filter(v => v.status === 'Active' && !enrolled.has(v.id))
    .map(v => {
      const c = master.progDetails.find(p => p.vid === v.id);
      return {
        vid: v.id, name: v.name, program: v.program, priority: v.priority,
        phone: v.phone || '', contact: c,
        savings: c ? parseAvgSavings(c.avgSavings) : 0
      };
    });
  list.sort((a,b) => b.savings - a.savings);
  return list;
}

// ─── Phase 3 helpers: ROI Calculator ──────────────────────────────────
function parseDollarString(s){
  if(s == null) return null;
  if(typeof s === 'number') return isNaN(s) ? null : s;
  const cleaned = String(s).replace(/[$,\s]/g, '');
  if(!cleaned) return null;
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
}
function computeStopROI(stopId){
  const rec = loadStopRecord(stopId);
  const membership = parseDollarString(rec.membershipCost);
  const priceFee = rec.priceFileFeeRemoved ? 0 : 295;
  const vendorSavingsCurrent = vendorSavingsForStop(stopId);
  const opps = vendorOpportunityForStop(stopId);
  const vendorSavingsOpportunity = opps.reduce((s, o) => s + (o.savings || 0), 0);
  const cost = (membership == null) ? null : membership + priceFee;
  const valueCurrent   = vendorSavingsCurrent;
  const valuePotential = vendorSavingsCurrent + vendorSavingsOpportunity;
  const netCurrent   = (cost == null) ? null : valueCurrent   - cost;
  const netPotential = (cost == null) ? null : valuePotential - cost;
  return {
    membership, priceFee, priceFileFeeRemoved: !!rec.priceFileFeeRemoved,
    cost,
    vendorSavingsCurrent, vendorSavingsOpportunity,
    valueCurrent, valuePotential,
    netCurrent, netPotential,
    membershipMissing: membership == null
  };
}

// ─── Phase 3 helpers: Stop Data CSV Import ────────────────────────────
async function handleImportStopData(input){
  const file = input.files && input.files[0];
  if(!file){ return; }
  try {
    const X = await ensureSheetJS();
    const buf = await file.arrayBuffer();
    const wb = X.read(buf, {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = X.utils.sheet_to_json(sheet, {raw:false, defval:''});
    if(!rows.length){ toast('CSV is empty'); input.value = ''; return; }
    // Normalize headers — case-insensitive lookup
    const headerMap = {};
    Object.keys(rows[0]).forEach(h => { headerMap[h.toLowerCase().trim()] = h; });
    const colStopId   = headerMap['stop id'] || headerMap['stopid'] || headerMap['site id'] || headerMap['siteid'];
    if(!colStopId){
      toast('CSV missing required "Stop ID" column');
      input.value = '';
      return;
    }
    const colMembership = headerMap['membership cost'];
    const colMgr        = headerMap['site manager'];
    const colEmail      = headerMap['email'];
    const colPhone      = headerMap['phone'];
    const colPff        = headerMap['price file fee removed'];
    const colFuelman    = headerMap['accepts fuelman']    || headerMap['fuelman'];
    const colRcheck     = headerMap['accepts r-check']    || headerMap['accepts rcheck'] || headerMap['r-check'] || headerMap['rcheck'];
    const colYtdGal     = headerMap['ytd total gallons']  || headerMap['ytd gallons']    || headerMap['gallons ytd'];
    const colRewardsAdds    = headerMap['rewards ytd adds']    || headerMap['rewards adds ytd']    || headerMap['ytd adds'];
    const colRewardsRedeems = headerMap['rewards ytd redeems'] || headerMap['rewards redeems ytd'] || headerMap['ytd redeems'];
    const truthy = v => /^(yes|true|1|y)$/i.test(String(v||'').trim());
    const parseDollarish = v => {
      if(v === '' || v == null) return null;
      const n = parseFloat(String(v).replace(/[$,\s]/g,''));
      return isNaN(n) ? null : n;
    };
    const parsed = [];
    let unmatched = 0;
    for(const r of rows){
      const csvLid = String(r[colStopId]||'').trim();
      if(!csvLid) continue;
      let stop = MEMBERS.find(m => m.id === csvLid);
      if(!stop){
        const padded = csvLid.replace(/^([A-Z])(\d+)$/, (_, p, n) => p + n.padStart(5, '0'));
        stop = MEMBERS.find(m => m.id === padded);
      }
      if(!stop){ unmatched++; continue; }
      const rec = {};
      if(colMembership && r[colMembership]) rec.membershipCost = String(r[colMembership]).trim();
      if(colMgr && r[colMgr]) rec.siteMgrName = String(r[colMgr]).trim();
      if(colEmail && r[colEmail]) rec.siteMgrEmail = String(r[colEmail]).trim();
      if(colPhone && r[colPhone]) rec.siteMgrPhone = String(r[colPhone]).trim();
      if(colPff && r[colPff] !== '') rec.priceFileFeeRemoved = truthy(r[colPff]);
      if(colFuelman && r[colFuelman] !== '') rec.acceptsFuelman = truthy(r[colFuelman]);
      if(colRcheck && r[colRcheck] !== '') rec.acceptsRcheck = truthy(r[colRcheck]);
      if(colYtdGal){
        const n = parseDollarish(r[colYtdGal]);
        if(n != null) rec.ytdTotalGallons = n;
      }
      if(colRewardsAdds){
        const n = parseDollarish(r[colRewardsAdds]);
        if(n != null) rec.rewardsYtdAdds = n;
      }
      if(colRewardsRedeems){
        const n = parseDollarish(r[colRewardsRedeems]);
        if(n != null) rec.rewardsYtdRedeems = n;
      }
      if(Object.keys(rec).length) parsed.push({stopId: stop.id, stopName: stop.name, rec});
    }
    previewStopDataImport(parsed, unmatched);
  } catch(e){
    console.error('Import error:', e);
    toast('Import failed: '+(e.message||e));
  } finally {
    input.value = '';
  }
}

let _pendingImport = null;
function previewStopDataImport(parsed, unmatched){
  _pendingImport = parsed;
  const sum = document.getElementById('stopdata-import-summary');
  const prev = document.getElementById('stopdata-import-preview');
  const commitBtn = document.getElementById('stopdata-import-commit');
  if(!sum || !prev || !commitBtn) return;
  sum.innerHTML = `Matched: <b style="color:var(--green)">${parsed.length}</b> stops · Unmatched: <b style="color:${unmatched?'var(--red)':'var(--muted)'}">${unmatched}</b>`;
  if(parsed.length === 0){
    prev.innerHTML = '<div style="color:var(--muted);font-size:.82em;margin-top:8px">No matchable rows. Check that the CSV has a Stop ID column with values like R03650.</div>';
    commitBtn.disabled = true;
    commitBtn.style.opacity = '.4';
  } else {
    const sample = parsed.slice(0, 5);
    prev.innerHTML = `<table class="import-preview-tbl"><thead><tr><th>Stop ID</th><th>Stop Name</th><th>Fields Updated</th></tr></thead><tbody>`+
      sample.map(p => `<tr><td>${esc(p.stopId)}</td><td>${esc(p.stopName)}</td><td style="font-size:.92em;color:var(--muted)">${esc(Object.keys(p.rec).join(', '))}</td></tr>`).join('')+
      `</tbody></table>${parsed.length>5?`<div style="font-size:.72em;color:var(--muted);margin-top:6px">… and ${parsed.length-5} more</div>`:''}`;
    commitBtn.disabled = false;
    commitBtn.style.opacity = '1';
  }
  document.getElementById('stopdata-import-modal').classList.add('show');
}
function commitStopDataImport(){
  if(!_pendingImport || !_pendingImport.length){ closeStopDataModal(); return; }
  const gsList = Object.keys(REGIONS).filter(g => g && g !== 'Unassigned');
  for(const gs of gsList){
    const key = LS_KEY + gs + '_stopdata';
    let cur = {};
    try { cur = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e){}
    for(const p of _pendingImport){
      cur[p.stopId] = Object.assign({}, cur[p.stopId] || {}, p.rec);
    }
    try { localStorage.setItem(key, JSON.stringify(cur)); } catch(e){}
  }
  // If the active GS is one of the imported ones, refresh in-memory stopdata
  const active = (typeof getActiveGS === 'function') ? getActiveGS() : null;
  if(active && gsList.includes(active)){
    try { stopdata = JSON.parse(localStorage.getItem(LS_KEY + active + '_stopdata') || '{}'); } catch(e){}
  }
  toast(`Imported ${_pendingImport.length} stops to ${gsList.length} GS namespaces`);
  closeStopDataModal();
  // Re-render dashboard so any visible drawer / cards refresh
  if(typeof renderDashboard === 'function') renderDashboard();
}
function closeStopDataModal(){
  _pendingImport = null;
  const m = document.getElementById('stopdata-import-modal');
  if(m){ m.classList.remove('show'); }
}

function openTaskForSite(siteId){

}

function populateTaskSiteSelect(val){
  const sel=document.getElementById('task-site');
  sel.innerHTML='<option value="">-- No specific stop --</option>'+
    myStops.map(s=>'<option value="'+s.id+'"'+(s.id===val?' selected':'')+'>'+esc(s.name)+' ('+s.state+')</option>').join('');

function editTask(id){
  const t=tasks.find(tk=>tk.id===id);if(!t)return;
  document.getElementById('task-modal-title').textContent='Edit Task';
  document.getElementById('task-edit-id').value=t.id;
  document.getElementById('task-title').value=t.title;
  document.getElementById('task-pri').value=t.priority;
  document.getElementById('task-status').value=t.status;
  document.getElementById('task-due').value=t.due||'';
  document.getElementById('task-cat').value=t.category||'general';
  document.getElementById('task-assign').value=t.assignedTo||'';
  document.getElementById('task-notes').value=t.notes||'';
  document.getElementById('task-del-btn').style.display='inline-block';
  populateTaskSiteSelect(t.siteId||'');
  openModal('task-modal');
}

function saveTask(){
  const title=document.getElementById('task-title').value.trim();
  if(!title){toast('Title required');return;}
  const editId=document.getElementById('task-edit-id').value;
  const obj={
    title,
    siteId:document.getElementById('task-site').value,
    priority:document.getElementById('task-pri').value,
    status:document.getElementById('task-status').value,
    due:document.getElementById('task-due').value,
    category:document.getElementById('task-cat').value,
    assignedTo:document.getElementById('task-assign').value,
    notes:document.getElementById('task-notes').value.trim(),
    updated:new Date().toISOString()
  };
  if(editId){
    const idx=tasks.findIndex(t=>t.id===editId);
    if(idx>-1)tasks[idx]={...tasks[idx],...obj};
  } else {
    obj.id='task_'+Date.now();
    obj.created=new Date().toISOString();
    tasks.push(obj);
  }
  saveData();closeModal('task-modal');renderCRM();renderDashboard();
  toast(editId?'Task updated':'Task added');
}

function deleteTask(){
  const id=document.getElementById('task-edit-id').value;
  if(!id||!confirm('Delete this task?'))return;
  tasks=tasks.filter(t=>t.id!==id);
  saveData();closeModal('task-modal');renderCRM();renderDashboard();
  toast('Task deleted');
}

function quickStatus(id,newStatus){
  const t=tasks.find(tk=>tk.id===id);if(!t)return;
  t.status=newStatus;t.updated=new Date().toISOString();
  saveData();renderCRM();toast('Status: '+newStatus);
}

// CALENDAR
// ═══════════════════════════════════════════════════════
function renderCalendar(){
  const now=new Date();
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDay=first.getDay();
  const daysInMonth=last.getDate();
  const monthName=first.toLocaleString('default',{month:'long',year:'numeric'});

  // Get events for this month
  const monthCalls=scheduledCalls.filter(c=>{const d=new Date(c.date);return d.getMonth()===calMonth&&d.getFullYear()===calYear;});
  const callDays=new Set(monthCalls.map(c=>new Date(c.date).getDate()));

  let calHTML=`<div class="card"><div class="card-hd" style="justify-content:space-between">
    <span>📅 ${monthName}</span>
    <div style="display:flex;gap:6px">
      <button class="btn" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">&lt;</button>
      <button class="btn" onclick="calMonth=new Date().getMonth();calYear=new Date().getFullYear();renderCalendar()">Today</button>
      <button class="btn" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">&gt;</button>
    </div></div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>'<div class="cal-hd">'+d+'</div>').join('')}
  `;
  // Empty cells before first day
  for(let i=0;i<startDay;i++)calHTML+='<div class="cal-day other"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const isToday=(d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear());
    const hasCall=callDays.has(d);
    calHTML+=`<div class="cal-day${isToday?' today':''}">${d}${hasCall?'<span class="cal-dot dot-call"></span>':''}</div>`;
  }
  calHTML+='</div></div>';

  // Upcoming calls list
  const upcoming=scheduledCalls.filter(c=>new Date(c.date+'T'+c.time)>=new Date()).sort((a,b)=>new Date(a.date+'T'+a.time)-new Date(b.date+'T'+b.time));
  calHTML+=`<div class="card"><div class="card-hd">📞 Upcoming Scheduled Calls (${upcoming.length})</div>`;
  if(upcoming.length){
    calHTML+=upcoming.slice(0,20).map(c=>{
      const s=MEMBERS.find(m=>m.id===c.siteId);
      return `<div class="log-entry age-fresh" style="cursor:pointer" onclick="openSiteDrawer('${c.siteId}')">
        <span class="log-date">${c.date} ${c.time}</span>
        <span style="font-size:.78em;color:var(--cyan);margin-left:6px">${esc(s?.name||c.siteId)}</span>
        <div class="log-body">${c.contact?'<b>Contact:</b> '+esc(c.contact)+' · ':''}${esc(c.purpose||'')}</div>
      </div>`;
    }).join('');
  } else {
    calHTML+='<div style="padding:16px;text-align:center;color:var(--muted);font-size:.82em">No upcoming calls scheduled.</div>';
  }
  calHTML+='</div>';
  document.getElementById('cal-content').innerHTML=calHTML;
}

// CALCULATOR (Phase 4: side-by-side Retail-Minus / Cost-Plus,
// saved scenarios, optional stop+fleet links)
// ═══════════════════════════════════════════════════════
// SheetJS is loaded on demand the first time a user clicks an Import
// or template button so the cold-load cost stays out of the critical
// path. Errors propagate so the caller can toast them.
function ensureSheetJS(){
  if(typeof window !== 'undefined' && typeof window.XLSX !== 'undefined') return Promise.resolve(window.XLSX);
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload = () => window.XLSX ? resolve(window.XLSX) : reject(new Error('SheetJS loaded but XLSX is undefined'));
    s.onerror = () => reject(new Error('SheetJS CDN load failed'));
    document.head.appendChild(s);
  });
}

function getCalcModel(){
  try { return JSON.parse(localStorage.getItem('gs_cmd_calc_model') || 'null'); }
  catch(e){ return null; }
}

// Returns CALC_DEFAULTS overlaid with imported coefficient values.
// Unknown coefficient names were filtered out at import time, so this
// just needs to map known names onto the right scenario fields.
function getCalcDefaults(){
  const defs = JSON.parse(JSON.stringify(CALC_DEFAULTS));
  const model = getCalcModel();
  if(!model || typeof model !== 'object') return defs;
  const c = (model.coefficients && typeof model.coefficients === 'object') ? model.coefficients : {};
  const num = v => { const n = parseFloat(v); return isNaN(n) ? null : n; };

  const dprR = num(c.default_diesel_price_retail);
  if(dprR !== null){ defs.retail.current.price = dprR; defs.retail.potential.price = dprR; }
  const dprC = num(c.default_diesel_price_costplus);
  if(dprC !== null){ defs.costPlus.current.price = dprC; defs.costPlus.potential.price = dprC; }

  const drD = num(c.default_retail_discount);
  if(drD !== null){ defs.retail.current.discount = drD; defs.retail.potential.discount = drD; }
  const dcD = num(c.default_costplus_discount);
  if(dcD !== null){ defs.costPlus.current.discount = dcD; defs.costPlus.potential.discount = dcD; }

  const dPct = num(c.def_pct_of_diesel_default);
  if(dPct !== null){ defs.retail.def.pct = dPct; defs.costPlus.def.pct = dPct; }
  const dPrice = num(c.def_price_per_gallon_default);
  if(dPrice !== null){ defs.retail.def.price = dPrice; defs.costPlus.def.price = dPrice; }

  const inGal = num(c.inside_store_avg_gal_per_txn);
  if(inGal !== null){ defs.retail.inside.avgGalPerTxn = inGal; defs.costPlus.inside.avgGalPerTxn = inGal; }
  const inRing = num(c.inside_store_avg_ring);
  if(inRing !== null){ defs.retail.inside.avgRing = inRing; defs.costPlus.inside.avgRing = inRing; }

  // processor_fee_pct_default is read into the model but the calculator
  // does not yet net the processor fee out of Total Potential New
  // Revenue. Keeping it in the recognized list so the import doesn't
  // warn about it; will be used when net-margin display lands.
  return defs;
}

// Walks a dotted path and assigns. Used by Import Scenarios to map a
// flat row's columns onto the nested scenario object.
function setPath(obj, path, val){
  const parts = path.split('.');
  let cur = obj;
  for(let i = 0; i < parts.length - 1; i++){
    if(!cur[parts[i]] || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = val;
}

function calcRowSales(group, row){
  // Sales contribution for a single row (main row OR a line item).
  // Group label decides which fields drive the math; unused fields on
  // a row are ignored, so a line item only needs to populate its
  // sales-driving columns.
  if(group === 'current' || group === 'potential'){
    return (+row.gallons||0) * ((+row.price||0) - (+row.discount||0));
  }
  if(group === 'def'){
    return (+row.gallons||0) * (+row.price||0);
  }
  if(group === 'inside'){
    return (+row.transactions||0) * (+row.avgRing||0);
  }
  return 0;
}

function calcGroupTotal(side, group){
  // Main row sales + sum of optional line items.
  const main = side[group];
  if(!main) return 0;
  let total = calcRowSales(group, main);
  if(Array.isArray(main.lineItems)){
    for(const li of main.lineItems) total += calcRowSales(group, li);
  }
  return total;
}

function calcSide(side){
  // Same shape for both Retail-Minus and Cost-Plus columns. Discount is
  // subtracted from price for both — the column label reframes what the
  // "price" is (retail vs cost+markup), but the diesel-sales math is
  // identical for the customer-facing total.
  const dieselCurrent   = calcGroupTotal(side, 'current');
  const dieselPotential = calcGroupTotal(side, 'potential');
  const defSales        = calcGroupTotal(side, 'def');
  const insideSales     = calcGroupTotal(side, 'inside');
  const totalNewRevenue = dieselPotential + defSales + insideSales;
  return { dieselCurrent, dieselPotential, defSales, insideSales, totalNewRevenue };
}

function getScenarios(){
  if(isAllGSMode()){
    // Manager rollup: walk every GS namespace and stamp source GS on each.
    const all = [];
    forEachGS((gsName, ns) => {
      try {
        const arr = JSON.parse(localStorage.getItem(ns('scenarios')) || '[]');
        if(Array.isArray(arr)) arr.forEach(s => all.push({ ...s, _gs: gsName }));
      } catch(e){}
    });
    return all;
  }
  const active = getActiveGS();
  if(!active) return [];
  try { return JSON.parse(localStorage.getItem(LS_KEY + active + '_scenarios') || '[]'); }
  catch(e){ return []; }
}

function saveScenarios(arr){
  // Per Q3b/Q4: scenario writes happen in a specific GS context only.
  if(isAllGSMode()) return;
  const active = getActiveGS();
  if(!active) return;
  localStorage.setItem(LS_KEY + active + '_scenarios', JSON.stringify(arr));
}

// Per-group field map shared by main row and line item rendering.
// Order matches the visible column order. The first three are the
// sales-driving inputs; the fourth column is reserved for the computed

  current:   [{n:'discount',label:'Discount',step:'0.01'},{n:'gallons',label:'Gallons',step:'1'},{n:'price',label:'Price/gal',step:'0.001'}],
  potential: [{n:'discount',label:'Discount',step:'0.01'},{n:'gallons',label:'Gallons',step:'1'},{n:'price',label:'Price/gal',step:'0.001'}],
  def:       [{n:'pct',label:'%',step:'0.01'},{n:'gallons',label:'Gallons',step:'1'},{n:'price',label:'Price/gal',step:'0.01'}],
  inside:    [{n:'avgGalPerTxn',label:'Gal/Txn',step:'1'},{n:'transactions',label:'# Txns',step:'1'},{n:'avgRing',label:'Avg Ring',step:'0.01'}]
};

function renderCalcLineItems(key, group, row /* allMode kept editable in scratchpad */){
  const items = Array.isArray(row.lineItems) ? row.lineItems : [];

    <div class="calc-line-row">
      <input type="text" value="${esc(li.label||'')}" placeholder="Label (e.g. Tier 2)" oninput="calcLineMeta('${key}','${group}',${idx},'label',this.value)">
      ${fields.map(f => `<input type="number" step="${f.step}" value="${li[f.n]||0}" title="${f.label}" oninput="calcLineChange('${key}','${group}',${idx},'${f.n}',this.value)">`).join('')}

    </div>

  html += `<button class="calc-add-line" onclick="addLineItem('${key}','${group}')">+ Add line</button>`;
  return html;
}

// ── Import / Export handlers (Phase 4b-2) ──
// Manager-only Import Model: reads a "Coefficients" sheet (Name | Value)
// and persists recognized coefficients to localStorage. Future scenarios
// pick these up via getCalcDefaults().
async function handleImportModel(input){
  if(!currentUser?.isManager){ toast('Manager only'); return; }
  const file = input.files && input.files[0];
  if(!file) return;
  try {
    const X = await ensureSheetJS();
    const buf = await file.arrayBuffer();
    const wb = X.read(buf, { type: 'array' });
    const sheet = wb.Sheets['Coefficients'] || wb.Sheets[wb.SheetNames[0]];
    if(!sheet){ toast('No "Coefficients" sheet found'); return; }
    const rows = X.utils.sheet_to_json(sheet, { header: 1, defval: null });
    const coefficients = {};
    let recognized = 0, unknown = 0;
    for(const row of rows){
      if(!Array.isArray(row) || row.length < 2) continue;
      const name = String(row[0] || '').trim();
      if(!name) continue;
      const lower = name.toLowerCase();
      if(lower === 'name' || lower === 'coefficient' || lower === '#') continue;
      if(CALC_COEFF_NAMES.includes(name)){ coefficients[name] = row[1]; recognized++; }
      else { console.warn('Import Model: unknown coefficient "' + name + '" — ignoring'); unknown++; }
    }
    if(!recognized){ toast('No recognized coefficients found'); return; }
    const model = {
      coefficients,
      _imported: { date: new Date().toISOString(), by: currentUser?.name || 'Manager', filename: file.name }
    };
    localStorage.setItem('gs_cmd_calc_model', JSON.stringify(model));
    // Re-seed calcCurrent only if the user is on a fresh untouched
    // scenario. Otherwise their in-flight edits are preserved.
    if(calcCurrent && !calcCurrent.id && !calcCurrent.name?.trim()){
      calcCurrent = null;
      ensureCalcCurrent();
    }
    toast('Model imported — ' + recognized + ' coefficients applied' + (unknown ? ' (' + unknown + ' unknown skipped)' : ''));
    renderCalculator();
  } catch(e){
    console.error('Import Model error:', e);
    toast('Import failed: ' + (e.message || e));
  } finally {
    input.value = '';
  }
}

// Import Scenarios: flat-sheet format. Picks the first sheet named
// "Scenarios" (case-insensitive) or falls back to the first sheet in
// the workbook. Each row → one scenario, layered on top of current
// defaults; missing cells leave the default in place. Disabled in
// Manager All-GS view since there is no namespace to write into.
async function handleImportScenarios(input){
  if(isAllGSMode()){ toast('Pick a specific GS first'); input.value=''; return; }
  const active = getActiveGS();
  if(!active){ toast('Pick a specific GS first'); input.value=''; return; }
  const file = input.files && input.files[0];
  if(!file) return;
  try {
    const X = await ensureSheetJS();
    const buf = await file.arrayBuffer();
    const wb = X.read(buf, { type: 'array' });
    const sheetName = wb.SheetNames.find(n => n.toLowerCase() === 'scenarios') || wb.SheetNames[0];
    const sheet = wb.Sheets[sheetName];
    if(!sheet){ toast('No sheets found in workbook'); return; }
    const rows = X.utils.sheet_to_json(sheet, { defval: null });
    if(!rows.length){ toast('No data rows in "' + sheetName + '"'); return; }
    const existing = getScenarios();
    const now = new Date().toISOString();
    let added = 0;
    rows.forEach((r, rowIdx) => {
      const scn = getCalcDefaults();
      let touched = false;
      for(const f of SCENARIO_FIELDS){
        const v = r[f.col];
        if(v === null || v === undefined || v === '') continue;
        if(f.type === 'number'){
          const n = parseFloat(v);
          if(isNaN(n)) continue;
          setPath(scn, f.path, n);
        } else {
          setPath(scn, f.path, String(v));
        }
        touched = true;
      }
      if(!touched || !scn.name || !String(scn.name).trim()) return;
      scn.id = 'scn_' + Date.now() + '_' + rowIdx;
      scn.created = now;
      scn.updated = now;
      existing.push(scn);
      added++;
    });
    if(!added){ toast('No valid scenarios found (rows need a Name)'); return; }
    saveScenarios(existing);
    toast('Imported ' + added + ' scenario' + (added === 1 ? '' : 's'));
    renderCalculator();
    renderDashboard();
  } catch(e){
    console.error('Import Scenarios error:', e);
    toast('Import failed: ' + (e.message || e));
  } finally {
    input.value = '';
  }
}

// Coefficient template — single sheet "Coefficients" pre-populated
// with every recognized name and a sensible sample value pulled from
// CALC_DEFAULTS so the file is immediately usable.
async function downloadCoefficientTemplate(){
  try {
    const X = await ensureSheetJS();
    const sample = {
      default_diesel_price_retail:    CALC_DEFAULTS.retail.current.price,
      default_diesel_price_costplus:  CALC_DEFAULTS.costPlus.current.price,
      default_retail_discount:        CALC_DEFAULTS.retail.current.discount,
      default_costplus_discount:      CALC_DEFAULTS.costPlus.current.discount,
      def_pct_of_diesel_default:      CALC_DEFAULTS.retail.def.pct,
      def_price_per_gallon_default:   CALC_DEFAULTS.retail.def.price,
      inside_store_avg_gal_per_txn:   CALC_DEFAULTS.retail.inside.avgGalPerTxn,
      inside_store_avg_ring:          CALC_DEFAULTS.retail.inside.avgRing,
      processor_fee_pct_default:      2.5
    };
    const aoa = [['Name', 'Value']];
    for(const n of CALC_COEFF_NAMES) aoa.push([n, sample[n] !== undefined ? sample[n] : '']);
    const ws = X.utils.aoa_to_sheet(aoa);
    const wb = X.utils.book_new();
    X.utils.book_append_sheet(wb, ws, 'Coefficients');

// ── CRM / Critical CSV import (Phase 5-2) ──
// Both reuse the SheetJS lazy loader from Phase 4b-2; xlsx@0.18.5
// reads CSV transparently. Stop matching is by site_id first, then a
// normalized name match in MEMBERS. Ambiguous name matches (>1 hit)
// are skipped and reported in the toast — the user can re-import with
// site_id filled in to disambiguate.
function _normName(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim(); }

function _resolveStop(row){
  // Returns { stop, ambiguous: bool }. stop is null when no match.
  const idRaw = String(row.site_id || row['Site ID'] || row.id || '').trim();
  if(idRaw){
    const byId = MEMBERS.find(m => m.id === idRaw);
    if(byId) return { stop: byId, ambiguous: false };
  }
  const nameInput = _normName(row.site_name || row['Site Name'] || row.name);
  if(!nameInput) return { stop: null, ambiguous: false };
  const matches = MEMBERS.filter(m => _normName(m.name) === nameInput);
  if(matches.length === 1) return { stop: matches[0], ambiguous: false };
  if(matches.length > 1)   return { stop: null, ambiguous: true };
  return { stop: null, ambiguous: false };
}

async function handleImportCRM(input){
  if(isAllGSMode()){ toast('Pick a specific GS first'); input.value=''; return; }
  if(!getActiveGS()){ toast('Pick a specific GS first'); input.value=''; return; }
  const file = input.files && input.files[0]; if(!file) return;
  try {
    const X = await ensureSheetJS();
    const buf = await file.arrayBuffer();
    const wb = X.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    if(!sheet){ toast('Empty workbook'); return; }
    const rows = X.utils.sheet_to_json(sheet, { defval: '' });
    if(!rows.length){ toast('No data rows in CSV'); return; }

    const validTypes = new Set(['call','task','note','followup','urgent']);
    let added = 0, skippedDupe = 0, ambiguous = 0, noMatch = 0;
    rows.forEach((r, idx) => {
      const { stop, ambiguous: amb } = _resolveStop(r);
      if(amb){ ambiguous++; return; }
      if(!stop){ noMatch++; return; }

      const subject = String(r.subject || r.Subject || '').trim();
      if(!subject) return; // skip rows without a subject — nothing to log
      const type = String(r.type || r.Type || 'note').toLowerCase().trim();
      const finalType = validTypes.has(type) ? type : 'note';
      const date = String(r.date || r.Date || '').trim() || new Date().toISOString();
      const notes = String(r.notes || r.Notes || '').trim();
      const contact = String(r.contact_name || r['Contact Name'] || '').trim();

      // Dedupe by (siteId, date, subject) — same contract as the spec.
      const existing = activityLogs[stop.id] || [];
      if(existing.some(l => l.date === date && (l.subject||'') === subject)){ skippedDupe++; return; }

      if(!activityLogs[stop.id]) activityLogs[stop.id] = [];
      activityLogs[stop.id].push({
        date, type: finalType, subject,
        notes: contact ? (contact + (notes ? ' — ' + notes : '')) : notes,
        id: 'log_' + Date.now() + '_' + idx
      });
      added++;
    });

    if(!added){
      const parts = [];
      if(skippedDupe) parts.push(skippedDupe + ' duplicate' + (skippedDupe===1?'':'s'));
      if(ambiguous)   parts.push(ambiguous + ' ambiguous');
      if(noMatch)     parts.push(noMatch + ' unmatched');
      toast('No new logs added' + (parts.length ? ' (' + parts.join(', ') + ')' : ''));
      return;
    }
    saveData();
    let msg = 'Imported ' + added + ' log' + (added===1?'':'s');
    if(skippedDupe) msg += ', ' + skippedDupe + ' dupes skipped';
    if(ambiguous)   msg += ', ' + ambiguous + ' ambiguous';
    if(noMatch)     msg += ', ' + noMatch + ' unmatched';
    toast(msg);
    renderCRM(); renderDashboard();
  } catch(e){
    console.error('Import CRM error:', e);
    toast('Import failed: ' + (e.message || e));
  } finally { input.value = ''; }
}

async function handleImportCritical(input){
  if(isAllGSMode()){ toast('Pick a specific GS first'); input.value=''; return; }
  if(!getActiveGS()){ toast('Pick a specific GS first'); input.value=''; return; }
  const file = input.files && input.files[0]; if(!file) return;
  try {
    const X = await ensureSheetJS();
    const buf = await file.arrayBuffer();
    const wb = X.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    if(!sheet){ toast('Empty workbook'); return; }
    const rows = X.utils.sheet_to_json(sheet, { defval: '' });
    if(!rows.length){ toast('No data rows in CSV'); return; }

    const validSev = new Set(['low','med','high']);
    let added = 0, ambiguous = 0, noMatch = 0;
    rows.forEach((r, idx) => {
      const { stop, ambiguous: amb } = _resolveStop(r);
      if(amb){ ambiguous++; return; }
      if(!stop){ noMatch++; return; }

      const title = String(r.title || r.Title || r.subject || '').trim();
      const desc  = String(r.description || r.Description || r.notes || '').trim();
      if(!title && !desc) return; // nothing to record
      const sevRaw = String(r.severity || r.Severity || 'med').toLowerCase().trim();
      const severity = validSev.has(sevRaw) ? sevRaw : 'med';
      const due = String(r.due_date || r['Due Date'] || '').trim();
      const reason = (title || '') + (desc ? (title?' — ':'') + desc : '') + (due ? ' (due ' + due + ')' : '');

      criticalItems.push({
        siteId: stop.id,
        reason: reason.trim(),
        severity,
        created: new Date().toISOString(),
        id: 'cr_' + Date.now() + '_' + idx
      });
      added++;
    });

    if(!added){
      const parts = [];
      if(ambiguous) parts.push(ambiguous + ' ambiguous');
      if(noMatch)   parts.push(noMatch + ' unmatched');
      toast('No new critical items' + (parts.length ? ' (' + parts.join(', ') + ')' : ''));
      return;
    }
    saveData();
    let msg = 'Imported ' + added + ' critical item' + (added===1?'':'s');
    if(ambiguous) msg += ', ' + ambiguous + ' ambiguous';
    if(noMatch)   msg += ', ' + noMatch + ' unmatched';
    toast(msg);
    renderCritical(); renderDashboard();
  } catch(e){
    console.error('Import Critical error:', e);
    toast('Import failed: ' + (e.message || e));
  } finally { input.value = ''; }
}
