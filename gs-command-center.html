// ── Line item handlers ──
// Add/remove cause a re-render so the new/removed row appears. Input
// changes on existing line items just trigger calcRecalcOutputs() so we
// don't churn the DOM on every keystroke.
function addLineItem(side, group){
  if(!calcCurrent) return;
  const row = calcCurrent[side][group];
  if(!row) return;
  if(!Array.isArray(row.lineItems)) row.lineItems = [];
  const blank = { label: '' };
  for(const f of (CALC_GROUP_FIELDS[group]||[])) blank[f.n] = 0;
  row.lineItems.push(blank);
  calcUpdateMeta(); // capture in-flight scenario name/stop/fleet/notes before re-render
  renderCalculator();
}

function removeLineItem(side, group, idx){
  if(!calcCurrent) return;
  const row = calcCurrent[side][group];
  if(!row || !Array.isArray(row.lineItems)) return;
  row.lineItems.splice(idx, 1);
  calcUpdateMeta();
  renderCalculator();
}

function calcLineChange(side, group, idx, field, value){
  if(!calcCurrent) return;
  const row = calcCurrent[side][group];
  if(!row || !Array.isArray(row.lineItems) || !row.lineItems[idx]) return;
  const num = parseFloat(value);
  row.lineItems[idx][field] = isNaN(num) ? 0 : num;
  calcRecalcOutputs();
}

function calcLineMeta(side, group, idx, field, value){
  if(!calcCurrent) return;
  const row = calcCurrent[side][group];
  if(!row || !Array.isArray(row.lineItems) || !row.lineItems[idx]) return;
  row.lineItems[idx][field] = value;
  // No recalc — label changes don't affect totals.
}

function calcInputChange(side, group, field, value){
  if(!calcCurrent) return;
  const num = parseFloat(value);
  calcCurrent[side][group][field] = isNaN(num) ? 0 : num;
  calcRecalcOutputs();
}

function calcUpdateMeta(){
  if(!calcCurrent) return;
  const name = document.getElementById('calc-name');
  const stop = document.getElementById('calc-stop');
  const fleet = document.getElementById('calc-fleet');
  const notes = document.getElementById('calc-notes');
  if(name) calcCurrent.name = name.value;
  if(stop) calcCurrent.stopId = stop.value;
  if(fleet) calcCurrent.fleet = fleet.value;
  if(notes) calcCurrent.notes = notes.value;
}

function calcRecalcOutputs(){
  if(!calcCurrent) return;
  const fmt = v => '$' + (v||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  ['retail','costPlus'].forEach(key => {
    const r = calcSide(calcCurrent[key]);
    const setVal = (id, val) => { const el = document.getElementById('out-'+key+'-'+id); if(el) el.value = fmt(val); };
    setVal('currentDiesel',   r.dieselCurrent);
    setVal('potentialDiesel', r.dieselPotential);
    setVal('defSales',        r.defSales);
    setVal('insideSales',     r.insideSales);
    const total = document.getElementById('out-'+key+'-total');
    if(total) total.textContent = fmt(r.totalNewRevenue);
  });
}

function saveCurrentScenario(){
  if(isAllGSMode()){ toast('Pick a specific GS first'); return; }
  calcUpdateMeta();
  if(!calcCurrent.name?.trim()){ toast('Scenario name required'); return; }
  const scenarios = getScenarios();
  const now = new Date().toISOString();
  if(calcCurrent.id){
    const idx = scenarios.findIndex(s => s.id === calcCurrent.id);
    if(idx > -1) scenarios[idx] = { ...calcCurrent, updated: now };
    else scenarios.push({ ...calcCurrent, updated: now }); // edge case: id existed but record gone
  } else {
    calcCurrent.id = 'scn_' + Date.now();
    calcCurrent.created = now;
    calcCurrent.updated = now;
    scenarios.push({ ...calcCurrent });
  }
  saveScenarios(scenarios);
  toast('Scenario saved');
  renderCalculator();
  renderDashboard();
}

function newCalcScenario(){
  calcCurrent = null;
  ensureCalcCurrent();
  renderCalculator();
  toast('New scenario — fill in values and Save');
}

function resetCalcDefaults(){
  if(!confirm('Reset all values on both sides to defaults? Saved scenarios are not affected.')) return;
  const keep = { id: calcCurrent?.id, name: calcCurrent?.name, stopId: calcCurrent?.stopId, fleet: calcCurrent?.fleet, notes: calcCurrent?.notes, created: calcCurrent?.created };
  calcCurrent = getCalcDefaults();
  Object.assign(calcCurrent, keep);
  renderCalculator();
}

function openScenario(id, gsName){
  // gsName is only present in All-GS mode (Manager browsing the rollup table).
  if(gsName && isAllGSMode()){
    if(!confirm('Switch the workstation to '+gsName+' to open this scenario?')) return;
    const sel = document.getElementById('gs-selector');
    if(sel) sel.value = gsName;
    changeGSSelection(gsName);
    // Now run again in the GS context
    setTimeout(() => openScenario(id), 50);
    return;
  }
  const scenarios = getScenarios();
  const s = scenarios.find(x => x.id === id);
  if(!s){ toast('Scenario not found'); return; }
  calcCurrent = JSON.parse(JSON.stringify(s));
  delete calcCurrent._gs; // strip rollup-only field
  renderCalculator();
}

function duplicateScenario(id){
  const scenarios = getScenarios();
  const s = scenarios.find(x => x.id === id);
  if(!s) return;
  const dup = JSON.parse(JSON.stringify(s));
  delete dup._gs;
  dup.id = 'scn_' + Date.now();
  dup.name = (s.name||'') + ' (copy)';
  dup.created = new Date().toISOString();
  dup.updated = dup.created;
  scenarios.push(dup);
  saveScenarios(scenarios);
  toast('Duplicated');
  renderCalculator();
}

function deleteScenario(id){
  if(!confirm('Delete this scenario? This cannot be undone.')) return;
  let scenarios = getScenarios();
  scenarios = scenarios.filter(s => s.id !== id);
  saveScenarios(scenarios);
  if(calcCurrent?.id === id) newCalcScenario();
  toast('Deleted');
  renderCalculator();
  renderDashboard();
}

function renderCritical(){
  const badge=document.getElementById('crit-badge');
  badge.textContent=criticalItems.length;badge.style.display=criticalItems.length?'inline':'none';

  document.getElementById('crit-content').innerHTML=`
    <div class="card">
      <div class="card-hd" style="justify-content:space-between">
        <span>🚨 Critical Attention Items (${criticalItems.length})</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${!isAllGSMode() ? `<label class="btn" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:.75em">📥 Import CSV
            <input type="file" accept=".csv,.xlsx,.xls" onchange="handleImportCritical(this)" style="display:none">
          </label>` : ''}
          <button class="btn" style="font-size:.75em" onclick="downloadCriticalTemplate()" title="Download a sample CSV with the expected columns">⤓ Template</button>
        </div>
      </div>
      ${criticalItems.length?criticalItems.map(c=>{
        const s=MEMBERS.find(m=>m.id===c.siteId);
        return `<div class="log-entry age-critical" style="cursor:pointer" onclick="openSiteDrawer('${c.siteId}')">
          <span class="log-date">${new Date(c.created).toLocaleString()}</span>
          <span style="font-size:.78em;color:var(--cyan);margin-left:6px">${esc(s?.name||c.siteId)}</span>
          <div class="log-body" style="font-size:.85em">${esc(c.reason)}</div>
          <button class="btn btn-red" onclick="event.stopPropagation();resolveCritical('${c.id}')" style="font-size:.68em;padding:2px 8px;position:absolute;top:8px;right:8px">Resolve</button>
        </div>`;
      }).join(''):'<div style="padding:30px;text-align:center;color:var(--muted)">No critical items. All clear! ✅</div>'}
    </div>
  `;
}
function resolveCritical(id){
  criticalItems=criticalItems.filter(c=>c.id!==id);saveData();renderCritical();renderDashboard();toast('Resolved');
}
