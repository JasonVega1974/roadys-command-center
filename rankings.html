<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>Roady's — Growth Strategist Rankings</title>
<style>
:root{
  --bg:#080C18;--surface:#0D1225;--surface2:#121830;--border:#1E2A45;--border2:#2A3A5C;
  --accent:#00C8FF;--green:#00D68F;--red:#FF4757;--yellow:#FFD60A;--orange:#FF6B35;
  --purple:#7C3AED;--teal:#0891B2;--text:#E8EDF8;--muted:#6B7A99;--dim:#3A4A6B;
  --ff:'Barlow Condensed','Arial Narrow',sans-serif;
  --fb:'DM Sans','Segoe UI',sans-serif;
}
body.day-mode{
  --bg:#F0F2F5;--surface:#FFFFFF;--surface2:#F7F8FA;--border:#D8DCE3;--border2:#C0C7D3;
  --accent:#0078D4;--green:#0B8A50;--red:#D32F2F;--yellow:#E6A800;--orange:#D4520A;
  --purple:#6528C7;--teal:#067A8B;--text:#1A1D24;--muted:#5A6170;--dim:#9AA0AD;
}
body.day-mode ::-webkit-scrollbar-track{background:#E8EBF0;}
body.day-mode ::-webkit-scrollbar-thumb{background:#C0C7D3;}
body.day-mode #usa-svg path{stroke:#D8DCE3;}
body.day-mode .pin-overlay{background:rgba(0,0,0,.4);}
body.day-mode .map-tooltip{background:rgba(255,255,255,.96);border-color:#D8DCE3;color:#1A1D24;}
body.day-mode .tog .slider{background:#B0BEC5;}
body.day-mode .tog input:checked+.slider{background:#4FC3F7;}
*{box-sizing:border-box;margin:0;padding:0;}
html{color-scheme:dark;}
body.day-mode{color-scheme:light;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;}
select option{background:var(--surface);color:var(--text);}
body.day-mode select option{background:#FFFFFF;color:#1A1D24;}
a{color:var(--accent);text-decoration:none;}


/* ── rankings page ── */
.wrap{max-width:1240px;margin:0 auto;padding:22px 26px;}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
.sec-title{font-family:var(--ff);font-size:1.5em;font-weight:800;letter-spacing:.08em;text-transform:uppercase;}
.badge{padding:3px 10px;border-radius:20px;font-size:.72em;font-weight:700;letter-spacing:.05em;}
.btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;font-size:.8em;cursor:pointer;font-family:var(--fb);}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 10px;font-size:.9em;cursor:pointer;margin-left:4px;}
body.dash-edit-mode #gsr-edit-btn{background:rgba(0,200,255,.18);border-color:var(--accent);color:var(--accent);}
.gsr-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:transform .12s,border-color .12s;}
.gsr-card:hover{transform:translateY(-2px);border-color:var(--accent);}
#gsr-modal{position:fixed;inset:0;background:rgba(2,6,23,.72);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:24px;overflow:auto;}
.gsr-modal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:1040px;width:100%;max-height:90vh;overflow:auto;padding:22px 26px;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.5);}
::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px;}
</style>
</head><body>
<div class="wrap">
  <div class="sec-hdr"><div class="sec-title">Growth Strategist Rankings</div>
    <span class="badge" id="gsr-period" style="background:rgba(0,200,255,.12);color:var(--accent)">—</span>
    <span style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <label style="font-size:.8em;color:var(--muted)">Month <select id="gsr-month" class="sel" onchange="gsrSetMonth(this.value)"></select></label>
      <button class="btn" id="gsr-edit-btn" onclick="gsrToggleMaster()">&#9998; Master mode</button>
      <button class="btn" onclick="gsrToggleDay()" title="Toggle day/night">&#9728;/&#9790;</button>
      <a class="btn" href="index.html">&#8592; Command Center</a>
    </span></div>
  <div style="color:var(--muted);font-size:.85em;margin:6px 0 18px">Score = green &divide; measurable cells (grey = not tracked, excluded). Click a card for the full scorecard.</div>
  <div id="gsr-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px"></div>
</div>
<div id="gsr-modal" onclick="if(event.target===this)gsrCloseModal()">
  <div class="gsr-modal-card">
    <button class="btn" onclick="gsrCloseModal()" style="position:absolute;top:14px;right:16px;z-index:2">&#10005; Close</button>
    <div id="gsr-modal-body"></div>
  </div>
</div>

  {key:'vend:V00036',label:'DAS',section:'vendor',sectionLabel:'Vendor Programs (Top 8)',measurable:true,kind:'vend',arg:'V00036'},
  {key:'vend:V00112',label:'Truck Parking Club',section:'vendor',sectionLabel:'Vendor Programs (Top 8)',measurable:true,kind:'vend',arg:'V00112'},
  {key:'vend:V00002',label:'Farmer Brothers',section:'vendor',sectionLabel:'Vendor Programs (Top 8)',measurable:true,kind:'vend',arg:'V00002'},
  {key:'vend:V00033',label:'Coca-Cola',section:'vendor',sectionLabel:'Vendor Programs (Top 8)',measurable:true,kind:'vend',arg:'V00033'},
  {key:'vend:V00232',label:'Heartland',section:'vendor',sectionLabel:'Vendor Programs (Top 8)',measurable:true,kind:'vend',arg:'V00232'},
  {key:'retention',label:'Retention Rate',section:'retention',sectionLabel:'Retention Rate',measurable:false}
];

function gsrFuelSeed(m){
  try{ if(m==='2026-06'&&typeof FUEL_JUN_2026_DATA==='object') return FUEL_JUN_2026_DATA; }catch(e){}
  try{ if(m==='2026-05'&&typeof FUEL_MAY_2026_DATA==='object') return FUEL_MAY_2026_DATA; }catch(e){}
  try{ if(m==='2026-04'&&typeof FUEL_APR_2026_DATA==='object') return FUEL_APR_2026_DATA; }catch(e){}
  return {};
}
function gsrRewardsSeed(m){
  try{ if(m==='2026-06'&&typeof REWARDS_2026_06_SEED==='object') return REWARDS_2026_06_SEED; }catch(e){}
  try{ if(m==='2026-05'&&typeof REWARDS_2026_05_SEED==='object') return REWARDS_2026_05_SEED; }catch(e){}
  try{ if(m==='2026-04'&&typeof REWARDS_2026_04_SEED==='object') return REWARDS_2026_04_SEED; }catch(e){}
  try{ if(m==='2026-03'&&typeof REWARDS_2026_03_SEED==='object') return REWARDS_2026_03_SEED; }catch(e){}
  try{ if(m==='2026-02'&&typeof REWARDS_2026_02_SEED==='object') return REWARDS_2026_02_SEED; }catch(e){}
  try{ if(m==='2026-01'&&typeof REWARDS_2026_01_SEED==='object') return REWARDS_2026_01_SEED; }catch(e){}
  return {};
}
function gsrVendorEnrolled(sid, vid){ try{ return !!((typeof VP_ENROLL==='object'&&VP_ENROLL[sid])||{})[vid]; }catch(e){ return false; } }
function gsrAgg(sid, canonical){ try{ return (typeof AGG_DISCOUNTS_BY_STOP==='object'&&AGG_DISCOUNTS_BY_STOP[sid]||[]).some(a=>a[0]===canonical)?1:0; }catch(e){ return 0; } }
function gsrAuto(row, sid, m){
  if(row.kind==='agg')    return gsrAgg(sid, GSR_AGG_NAME[row.arg]);
  if(row.kind==='fleets') return (gsrFuelSeed(m)[sid]?.fl>0)?1:0;
  if(row.kind==='rewards')return (gsrRewardsSeed(m)[sid]?.g>0)?1:0;
  if(row.kind==='vend')   return gsrVendorEnrolled(sid,row.arg)?1:0;
  return null; // grey rows have no auto source
}

// ── overrides + snapshots (localStorage; Supabase-shaped) ──
const GSR_OV_KEY='roadys_gsr_overrides', GSR_SNAP_KEY='roadys_gsr_snapshots';
function gsrLoadJSON(k){ try{ return JSON.parse(localStorage.getItem(k)||'{}'); }catch(e){ return {}; } }
function gsrSaveJSON(k,o){ try{ localStorage.setItem(k, JSON.stringify(o)); }catch(e){} }
function gsrOvId(gs,sid,key,m){ return [gs,sid,key,m].join('|'); }
function gsrGetOverride(gs,sid,key,m){ const v=gsrLoadJSON(GSR_OV_KEY)[gsrOvId(gs,sid,key,m)]; return v==null?undefined:v; }
function gsrSetOverride(gs,sid,key,m,val){ const o=gsrLoadJSON(GSR_OV_KEY); const id=gsrOvId(gs,sid,key,m); if(val==null) delete o[id]; else o[id]=val?1:0; gsrSaveJSON(GSR_OV_KEY,o); }
function gsrSaveSnapshot(r){ const o=gsrLoadJSON(GSR_SNAP_KEY); o[r.gs+'|'+r.month]={gs:r.gs,month:r.month,pct:r.overall.pct,green:r.overall.green,meas:r.overall.meas,metricSetVersion:r.metricSetVersion,ts:Date.now()}; gsrSaveJSON(GSR_SNAP_KEY,o); }
function gsrLoadSnapshots(){ return gsrLoadJSON(GSR_SNAP_KEY); }
function gsrSnapshot(gs,m){ return gsrLoadSnapshots()[gs+'|'+m]||null; }
function gsrPrevMonth(m){ const p=m.split('-').map(Number); const d=new Date(p[0],p[1]-2,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function gsrYtdAvg(gs,m){ const y=m.split('-')[0]; const vals=Object.values(gsrLoadSnapshots()).filter(s=>s.gs===gs&&s.month.slice(0,4)===y&&s.month<=m).map(s=>s.pct); return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : null; }

// ── scoring: green ÷ measurable cells (mean of 1/0 cells); grey excluded ──
function gsrCompute(gs, m){
  const stops=((typeof GS_TERRITORY==='object'&&GS_TERRITORY[gs])?GS_TERRITORY[gs].stops:[])||[];
  const metrics=GSR_METRICS.map(row=>{
    const cells={}; let anyOverride=false;
    for(const st of stops){
      const ov=gsrGetOverride(gs, st.id, row.key, m);
      if(ov!=null) anyOverride=true;
      const auto=gsrAuto(row, st.id, m);
      cells[st.id]={ v: (ov!=null?ov:auto) };
    }
    const active = row.measurable || anyOverride;
    let green=0, meas=0, greenStops=0;
    for(const st of stops){
      const c=cells[st.id];
      if(!active){ c.state='grey'; continue; }
      const val = c.v==null ? 0 : c.v; c.v=val; c.state = val? 'green':'red';
      meas++; if(val){ green++; greenStops++; }
    }
    return {key:row.key,label:row.label,section:row.section,sectionLabel:row.sectionLabel,measurable:row.measurable,active,cells,greenStops,measStops:active?stops.length:0,green,meas,pct:meas?green/meas:0};
  });
  const secMap={};
  for(const mx of metrics){ if(!mx.active) continue; const s=secMap[mx.section]=secMap[mx.section]||{section:mx.section,label:mx.sectionLabel,green:0,meas:0}; s.green+=mx.green; s.meas+=mx.meas; }
  const sections=Object.values(secMap).map(s=>({section:s.section,label:s.label,green:s.green,meas:s.meas,pct:s.meas?s.green/s.meas:0}));
  const perStop={};
  for(const st of stops){ let g=0,me=0; for(const mx of metrics){ if(!mx.active) continue; const val=mx.cells[st.id].v; me++; if(val) g++; } perStop[st.id]={green:g,meas:me,pct:me?g/me:0}; }
  const green=metrics.reduce((a,mx)=>a+mx.green,0), meas=metrics.reduce((a,mx)=>a+mx.meas,0);
  const version='gsr:'+metrics.filter(mx=>mx.active).map(mx=>mx.key).sort().join(',');
  return {gs,month:m,metrics,sections,stops,perStop,overall:{green,meas,pct:meas?green/meas:0},metricSetVersion:version};
}
// ── GSR_ENGINE:BODY_END ──

// ── RANKINGS UI (standalone) ──
function gsrEsc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function gsrPct(x){ return (x==null)?'—':(Math.round(x*1000)/10).toFixed(1)+'%'; }
function gsrColor(x){ if(x==null) return 'var(--muted)'; return x>=0.66?'var(--green)':(x>=0.33?'var(--yellow)':'var(--red)'); }
function gsrCurMonth(){ const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function gsrMonthLabel(m){ const p=m.split('-').map(Number); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][p[1]-1]+' '+p[0]; }
function gsrIsEdit(){ return document.body.classList.contains('dash-edit-mode'); }
function gsrGSList(){ return (typeof GS_TERRITORY==='object'&&GS_TERRITORY)?Object.keys(GS_TERRITORY).sort():[]; }
function gsrGetMonth(){ try{ return localStorage.getItem('roadys_gsr_month')||gsrCurMonth(); }catch(e){ return gsrCurMonth(); } }
function gsrSetMonth(v){ try{ localStorage.setItem('roadys_gsr_month',v); }catch(e){} gsrRerender(); }
function gsrAllScores(m){ return gsrGSList().map(gs=>{ const r=gsrCompute(gs,m); return {gs,pct:r.overall.pct,green:r.overall.green,meas:r.overall.meas,stops:r.stops.length}; }).sort((a,b)=>b.pct-a.pct); }

// ── scorecard (tile grid + expandable stops) — used inside the modal ──
function gsrScorecardHTML(gs,m){
  const r=gsrCompute(gs,m);
  const scores=gsrAllScores(m); const rank=scores.findIndex(s=>s.gs===gs)+1;
  const order=[]; const bySec={};
  for(const mx of r.metrics){ if(!bySec[mx.section]){ bySec[mx.section]={label:mx.sectionLabel, active:[], grey:[]}; order.push(mx.section); } bySec[mx.section][mx.active?'active':'grey'].push(mx); }
  const tile=(mx)=>{ const w=mx.measStops?Math.round(mx.greenStops/mx.measStops*100):0; const col=gsrColor(mx.pct);
    return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;min-height:98px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${gsrEsc(mx.label)}">${gsrEsc(mx.label)}</div>
      <div><div style="display:flex;align-items:baseline;justify-content:space-between;gap:6px"><span style="font-size:20px;font-weight:800;color:${col}">${mx.greenStops}/${mx.measStops}</span><span style="font-size:13px;font-weight:700;color:${col}">${gsrPct(mx.pct)}</span></div>
      <div style="height:4px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden"><div style="height:100%;width:${w}%;background:${col}"></div></div></div>
    </div>`; };
  const greyTile=(mx)=>`<div style="background:var(--surface);border:1px dashed var(--border2);border-radius:12px;padding:12px;min-height:98px;display:flex;flex-direction:column;justify-content:space-between;opacity:.8">
      <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${gsrEsc(mx.label)}">${gsrEsc(mx.label)}</div>
      <div style="font-size:11px;color:var(--muted)">not tracked${gsrIsEdit()?' · editable':''}</div></div>`;
  let secHtml='';
  for(const sk of order){ const s=bySec[sk]; const sec=r.sections.find(x=>x.section===sk);
    const tiles=s.active.map(tile).join('')+s.grey.map(greyTile).join('');
    secHtml+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:8px">
        <span style="font-family:var(--ff);font-size:.95em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent)">${gsrEsc(s.label)}</span>
        ${sec?`<span style="font-size:.9em;font-weight:800;color:${gsrColor(sec.pct)};white-space:nowrap">${sec.green}/${sec.meas} · ${gsrPct(sec.pct)}</span>`:'<span style="font-size:.78em;color:var(--dim)">not yet tracked</span>'}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">${tiles}</div></div>`;
  }
  const stopRows=r.stops.map(st=>{ const ps=r.perStop[st.id];
    return `<div style="border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer" onclick="gsrToggleStop(this)">
        <span class="gsr-exp" style="font-size:.7em;color:var(--muted)">▶</span>
        <span style="flex:1;font-size:.88em">${gsrEsc(st.name)} <span style="color:var(--muted)">${gsrEsc(st.id)}</span></span>
        <span style="color:${gsrColor(ps.pct)};font-weight:700;font-size:.88em">${ps.green}/${ps.meas} · ${gsrPct(ps.pct)}</span></div>
      <div class="gsr-stop-exp" style="display:none;padding:4px 8px 12px 26px">${gsrStopCellsHTML(r,gs,st.id,m)}</div></div>`;
  }).join('');
  const headCard=`<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:var(--surface2);border:1px solid var(--border);border-left:4px solid ${gsrColor(r.overall.pct)};border-radius:12px;padding:14px 18px;margin-bottom:16px">
      <div style="font-size:1.4em;font-weight:800">${gsrEsc(gs)}</div>
      <div style="font-size:2.1em;font-weight:900;color:${gsrColor(r.overall.pct)};line-height:1">${gsrPct(r.overall.pct)}</div>
      <div style="color:var(--muted);font-size:.85em;line-height:1.5"><div><b style="color:var(--text)">${r.overall.green}/${r.overall.meas}</b> measurable cells green</div><div>Rank <b style="color:var(--text)">#${rank}</b> of ${scores.length} · ${r.stops.length} stops</div></div></div>`;
  return headCard + secHtml +
    `<div style="font-family:var(--ff);font-size:.82em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:8px 0 6px">Truck stops (${r.stops.length})${gsrIsEdit()?' — click a stop, then a tag to set green/red':''}</div>
     <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">${stopRows}</div>`;
}
function gsrStopCellsHTML(r,gs,sid,m){ const edit=gsrIsEdit();
  return '<div style="display:flex;flex-wrap:wrap;gap:5px">'+r.metrics.map(mx=>{ const c=mx.cells[sid]; let bg,fg,txt;
    if(c.state==='green'){bg='rgba(0,214,143,.15)';fg='var(--green)';txt='✓';}
    else if(c.state==='red'){bg='rgba(255,71,87,.12)';fg='var(--red)';txt='✗';}
    else {bg='var(--surface2)';fg='var(--dim)';txt='–';}
    const onclick=edit?`onclick="event.stopPropagation();gsrToggleCell('${gsrEsc(gs)}','${gsrEsc(sid)}','${gsrEsc(mx.key)}','${m}')"`:'';
    return `<span ${onclick} style="cursor:${edit?'pointer':'default'};background:${bg};color:${fg};border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:.74em" title="${gsrEsc(mx.label)}">${gsrEsc(mx.label)} ${txt}</span>`;
  }).join('')+'</div>'; }
function gsrToggleStop(el){ const d=el.parentElement.querySelector('.gsr-stop-exp'); const a=el.querySelector('.gsr-exp'); if(d){ const open=d.style.display==='none'; d.style.display=open?'block':'none'; if(a) a.textContent=open?'▼':'▶'; } }
function gsrToggleCell(gs,sid,key,m){ const cur=gsrGetOverride(gs,sid,key,m); let next; if(cur===undefined)next=1; else if(cur===1)next=0; else next=null; gsrSetOverride(gs,sid,key,m,next); gsrRerender(); }

// ── dashboard cards ──
function gsrRenderCards(m){
  const scores=gsrAllScores(m);
  const cards=scores.map((s,i)=>{
    const prev=gsrSnapshot(s.gs, gsrPrevMonth(m)); const ytd=gsrYtdAvg(s.gs,m); const col=gsrColor(s.pct);
    const mv=(prev&&prev.pct!=null)?(s.pct>prev.pct?'<span style="color:var(--green)">▲</span>':(s.pct<prev.pct?'<span style="color:var(--red)">▼</span>':'<span style="color:var(--muted)">–</span>')):'';
    return `<div class="gsr-card" onclick="gsrOpenModal('${gsrEsc(s.gs)}')" style="cursor:pointer">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="width:30px;height:30px;flex:0 0 auto;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9em">${i+1}</span>
        <span style="font-size:1.1em;font-weight:800;flex:1">${gsrEsc(s.gs)}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-size:2.2em;font-weight:900;color:${col};line-height:1">${gsrPct(s.pct)}</span>${mv}
      </div>
      <div style="height:5px;border-radius:3px;background:var(--border);margin:8px 0;overflow:hidden"><div style="height:100%;width:${Math.round(s.pct*100)}%;background:${col}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:.78em;color:var(--muted)">
        <span><b style="color:var(--text)">${s.green}/${s.meas}</b> cells · ${s.stops} stops</span>
        <span>prev ${gsrPct(prev?prev.pct:null)} · YTD ${gsrPct(ytd)}</span>
      </div>
      <div style="font-size:.72em;color:var(--accent);margin-top:8px">View scorecard →</div>
    </div>`;
  }).join('');
  const grid=document.getElementById('gsr-cards');
  if(grid) grid.innerHTML=cards;
}

// ── modal ──
let gsrModalGS=null;
function gsrOpenModal(gs){ gsrModalGS=gs; const m=gsrGetMonth();
  const ov=document.getElementById('gsr-modal');
  document.getElementById('gsr-modal-body').innerHTML=gsrScorecardHTML(gs,m);
  ov.style.display='flex';
}
function gsrCloseModal(){ gsrModalGS=null; const ov=document.getElementById('gsr-modal'); if(ov) ov.style.display='none'; }
function gsrRerender(){
  const m=gsrGetMonth(), cal=new Date(), curCal=cal.getFullYear()+'-'+String(cal.getMonth()+1).padStart(2,'0');
  if(m<curCal){ gsrGSList().forEach(gs=>{ try{ gsrSaveSnapshot(gsrCompute(gs,m)); }catch(e){} }); }
  const badge=document.getElementById('gsr-period'); if(badge) badge.textContent=gsrMonthLabel(m);
  gsrRenderCards(m);
  if(gsrModalGS){ document.getElementById('gsr-modal-body').innerHTML=gsrScorecardHTML(gsrModalGS,m); }
}

// ── init ──
function gsrToggleMaster(){ const on=!document.body.classList.contains('dash-edit-mode'); document.body.classList.toggle('dash-edit-mode',on); try{ localStorage.setItem('roadys_gsr_edit',on?'1':''); }catch(e){} const b=document.getElementById('gsr-edit-btn'); if(b) b.textContent=on?'✎ Master mode: ON':'✎ Master mode'; gsrRerender(); }
function gsrToggleDay(){ const on=!document.body.classList.contains('day-mode'); document.body.classList.toggle('day-mode',on); try{ localStorage.setItem('roadys_day_mode',on?'1':''); }catch(e){} }
window.addEventListener('DOMContentLoaded', ()=>{
  try{ if(typeof loadVPEnroll==='function') loadVPEnroll(); }catch(e){}
  try{ if(localStorage.getItem('roadys_day_mode')) document.body.classList.add('day-mode'); }catch(e){}
  try{ if(localStorage.getItem('roadys_gsr_edit')) document.body.classList.add('dash-edit-mode'); }catch(e){}
  const eb=document.getElementById('gsr-edit-btn'); if(eb&&gsrIsEdit()) eb.textContent='✎ Master mode: ON';
  // month select
  const ms=document.getElementById('gsr-month'); if(ms){ ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06'].forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=gsrMonthLabel(k); if(k===gsrGetMonth())o.selected=true; ms.appendChild(o); }); }
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') gsrCloseModal(); });
  gsrRerender();
});
// ── /RANKINGS UI ──

</script>
