<!--
  Roady's — Truck Stop Aggregator Opt-In
  -------------------------------------------------------------
  Public, token-gated opt-in form for truck stops. RPC-only against
  Supabase (resolve_optin_token / resolve_optin_by_code /
  list_optin_aggregators / submit_optin) — it holds NO direct table
  grants and never reads optin_token. Built across plan tasks 1-4.
  Task 1: page scaffold + calculator pure functions (profit/gal, re-anchor).
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roady's — Aggregator Opt-In</title>
<style>
:root{
  --o-bg:#0e1117; --o-surface:#161c26; --o-surface-2:#1c2431; --o-line:#2a3547;
  --o-text:#e8edf4; --o-muted:#8a98ac; --o-faint:#5c6a7e;
  --o-amber:#f5a524; --o-green:#34d399; --o-green-soft:#10311f; --o-red:#f87171;
  --o-radius:12px; --o-sans:"Inter","Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--o-sans);color:var(--o-text);
  background:radial-gradient(1100px 560px at 80% -10%,#16202e 0,transparent 60%),var(--o-bg);
  min-height:100vh;line-height:1.45;font-size:14px;-webkit-font-smoothing:antialiased}
.opt-wrap{max-width:880px;margin:0 auto;padding:24px 18px 80px}
.opt-head h1{font-size:20px;margin:0 0 2px;letter-spacing:-.2px}
.opt-head .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--o-faint);font-weight:700}
.opt-sub{font-size:12.5px;color:var(--o-muted);margin-top:2px}
.opt-calc{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;background:var(--o-surface);
  border:1px solid var(--o-line);border-radius:var(--o-radius);padding:14px;margin-top:18px}
.opt-calc label{font-size:11px;color:var(--o-muted);font-weight:600;display:flex;flex-direction:column;gap:5px}
.opt-calc input{background:var(--o-bg);border:1px solid var(--o-line);border-radius:8px;color:var(--o-text);
  padding:8px 10px;font-size:15px;width:150px;font-family:inherit}
.opt-spread{font-size:12px;color:var(--o-muted);align-self:center}
.opt-spread b{color:var(--o-text)}
#optBody{margin-top:6px}
.opt-firm{background:var(--o-surface-2);border:1px solid var(--o-amber);border-radius:var(--o-radius);
  padding:12px 14px;font-size:13px;color:var(--o-text);margin:14px 0 4px;line-height:1.5}
.opt-firm b{color:var(--o-amber)}
.opt-card{background:var(--o-surface);border:1px solid var(--o-line);border-radius:var(--o-radius);padding:16px 16px 14px;margin-top:14px}
.opt-name{font-size:16px;font-weight:700}
.opt-fleets{font-size:12px;color:var(--o-amber);font-weight:600;margin-top:1px}
.opt-desc{font-size:12.5px;color:var(--o-muted);margin:5px 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.opt-profit{font-size:34px;font-weight:800;color:var(--o-green);letter-spacing:-1px;line-height:1.05;margin:2px 0}
.opt-profit.muted{font-size:18px;color:var(--o-faint);font-weight:600;letter-spacing:0}
.opt-rec{font-size:12px;color:var(--o-muted);margin:3px 0 12px}
.opt-rec b{color:var(--o-text);font-weight:700}
.opt-disc{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.opt-type{background:var(--o-bg);border:1px solid var(--o-line);color:var(--o-muted);border-radius:8px;
  padding:7px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.opt-type.on{border-color:var(--o-green);color:var(--o-green);box-shadow:0 0 0 1px var(--o-green) inset}
.opt-val{background:var(--o-bg);border:1px solid var(--o-line);color:var(--o-text);border-radius:8px;
  padding:7px 9px;font-size:13px;width:58px;font-family:inherit}
.opt-choose{display:flex;gap:8px;margin-top:12px}
.opt-status{flex:1;background:var(--o-bg);border:1px solid var(--o-line);color:var(--o-muted);border-radius:8px;
  padding:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.opt-status[data-opt-status="Yes"].on{border-color:var(--o-green);color:var(--o-green);background:var(--o-green-soft)}
.opt-status[data-opt-status="No"].on{border-color:var(--o-red);color:var(--o-red);background:rgba(248,113,113,.10)}
.opt-faint{color:var(--o-faint)}
.opt-submit{display:block;width:100%;margin-top:18px;background:var(--o-green);color:#06281a;border:none;
  border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
.opt-submit:disabled{opacity:.55;cursor:default}
.opt-msg{margin-top:10px;font-size:12.5px;color:var(--o-amber);min-height:16px}
.opt-fallback{margin-top:18px}
.opt-done h2{color:var(--o-green);font-size:22px;margin:8px 0 4px}
.opt-summary{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
.opt-summary th,.opt-summary td{text-align:left;padding:7px 8px;border-bottom:1px solid var(--o-line)}
.opt-summary th{color:var(--o-muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
</style>
</head>
<body>
<div class="opt-wrap">
  <div class="opt-head">
    <div class="eyebrow">Roady's Network</div>
    <h1 id="optTitle">Aggregator Opt-In</h1>
    <div class="opt-sub" id="optSub"></div>
  </div>
  <div class="opt-calc" id="optCalc" hidden>
    <label>Your fuel cost ($/gal)<input id="optCost" type="number" step="0.001" inputmode="decimal" placeholder="3.00"></label>
    <label>Your retail / pump ($/gal)<input id="optRetail" type="number" step="0.001" inputmode="decimal" placeholder="3.40"></label>
    <div class="opt-spread" id="optSpread"></div>
  </div>
  <div id="optBody"></div>
  <button type="button" id="optSubmit" class="opt-submit" hidden>Submit my opt-in choices</button>
  <div id="optMsg" class="opt-msg"></div>
  <form id="optFallback" class="opt-fallback" hidden>
    <div class="opt-firm">We couldn't open your personalized link. Enter your <b>Store #</b> and <b>stop name</b> to continue.</div>
    <div class="opt-calc">
      <label>Store # (LID)<input id="optFallCode" type="text" autocomplete="off"></label>
      <label>Stop name<input id="optFallName" type="text" autocomplete="off"></label>
    </div>
    <button type="submit" id="optFallFind" class="opt-submit">Find my stop</button>
    <div id="optFallMsg" class="opt-msg"></div>
  </form>
</div>

<script>
(function(){
"use strict";

/* =====================================================================
   SUPABASE — RPC ONLY. This page calls four SECURITY DEFINER functions
   and holds NO direct table grants; it never reads optin_token.
   Setup copied verbatim from gs-command-center.html (same project/anon key).
   ===================================================================== */
const ROADYS_SB_URL = 'https://yyhnnalsqzyghjqtfisy.supabase.co';
const ROADYS_SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5aG5uYWxzcXp5Z2hqcXRmaXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDE4NzksImV4cCI6MjA4OTQxNzg3OX0.misOc3tEQD0GBOsjNkv6Im8wUmlfXhiX97DflpgaqAc';
let _sbClient = null;
function ensureSupabaseLib(){
  if(typeof window !== 'undefined' && window.supabase) return Promise.resolve(window.supabase);
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.onload = () => window.supabase ? resolve(window.supabase) : reject(new Error('supabase-js loaded but window.supabase undefined'));
    s.onerror = () => reject(new Error('supabase-js CDN load failed'));
    document.head.appendChild(s);
  });
}
function getRoadysSB(){
  if(_sbClient) return _sbClient;
  if(typeof window !== 'undefined' && window.supabase){
    try { _sbClient = window.supabase.createClient(ROADYS_SB_URL, ROADYS_SB_ANON); return _sbClient; }
    catch(e){ console.warn('getRoadysSB: ' + e.message); return null; }
  }
  return null;
}

/* ---------- stop resolution (token via ?t=, or store#+name fallback) ----------
   Resolution returns only safe stop fields; optin_token is stripped SERVER-SIDE
   by the SECURITY DEFINER function — the client never receives or reads it. */
let _client=null;   // test override; falls back to getRoadysSB()
let _query=null;    // test override for the query string
let _session=null;  // {mode:'token',token} | {mode:'code',code,name} — set on resolve, used by submit()
function sbc(){ return _client || getRoadysSB(); }
function currentToken(){
  if(_query) return _query.t||"";
  try{ return new URLSearchParams(window.location.search).get('t')||""; }catch(e){ return ""; }
}
async function loadAggregators(sb){
  const {data,error}=await sb.rpc('list_optin_aggregators');
  return error?[]:(data||[]);
}
async function resolveStop(){
  const sb=sbc();
  if(!sb) return {needFallback:true};            // lib not ready / client unavailable
  const tok=currentToken();
  if(!tok) return {needFallback:true};
  const {data,error}=await sb.rpc('resolve_optin_token',{p_token:tok});
  if(error||!data||!data.length) return {needFallback:true};
  _session={mode:'token', token:tok};            // submit() will use submit_optin
  return {stop:data[0], aggregators:await loadAggregators(sb)};
}
async function resolveByCode(code,name){
  const sb=sbc();
  if(!sb) return {error:true};                   // can't reach the service
  const {data,error}=await sb.rpc('resolve_optin_by_code',{p_code:code,p_name:name});
  if(error||!data||!data.length) return {notFound:true};
  _session={mode:'code', code:code, name:name};  // submit() will use submit_optin_by_code
  return {stop:data[0], aggregators:await loadAggregators(sb)};
}

/* =====================================================================
   CALCULATOR (pure) — per-gallon profit + discount-unit re-anchoring
   ---------------------------------------------------------------------
   cost / retail are dollars per gallon (e.g. 3.00). Values are cents.
     Cost + X  -> the stop nets X cents/gal (margin above its cost).
     Retail - Y-> the stop nets (retail - cost) - Y cents/gal.
   ===================================================================== */
function profitPerGal(type, value, cost, retail){
  const v = parseFloat(value); if(isNaN(v)) return null;
  if(type==='C+') return v;                          // cost-plus: the +X cents
  if(type==='R-'){                                   // retail-minus: spread - Y (needs cost+retail)
    const c=parseFloat(cost), r=parseFloat(retail);
    if(isNaN(c)||isNaN(r)) return null;
    return Math.round((r-c)*100) - v;
  }
  return null;
}
// Express a recommended discount in the unit the stop currently has selected,
// using their spread, so the recommendation and their choice share one unit.
// R-Y and C+X are equal when X = spread - Y (and Y = spread - X), so the
// re-anchored recommendation carries the SAME profit.
function reanchor(recType, recValue, targetType, cost, retail){
  // "Better Of" (BO) = the same cents value in EITHER unit, so it carries straight
  // into whatever unit the stop selected — no spread conversion.
  if(recType==='BO') return {type:targetType, value:parseInt(recValue,10)||0};
  if(recType===targetType) return {type:recType, value:parseInt(recValue,10)||0};
  const c=parseFloat(cost), r=parseFloat(retail);
  if(isNaN(c)||isNaN(r)) return {type:targetType, value:null};   // need the spread to convert
  const spread=Math.round((r-c)*100), v=parseInt(recValue,10)||0;
  // symmetric by construction: X = spread - Y AND Y = spread - X, so this one
  // formula converts in both directions (R-→C+ and C+→R-). Do not split it.
  return {type:targetType, value: spread - v};
}

/* =====================================================================
   RENDER — firm statement + one card per aggregator into #optBody.
   Cost/retail are read live from the static #optCost/#optRetail inputs,
   so the cards never wipe the calculator on re-render.
   ===================================================================== */
let _stop=null, _aggs=[], _choices={}, _lastHTML='';
function byId(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function unitLabel(type){ return type==='C+'?'Cost +':type==='R-'?'Retail −':'—'; }
function readVal(id){ const el=byId(id); return el?el.value:''; }
function cardHTML(a, cost, retail){
  const ch=_choices[a.id]||{};
  // the card's working unit is C+ or R- only; a BO ("Better Of") aggregator defaults to C+
  const cType=ch.type||(a.discount_type==='BO'?'C+':a.discount_type)||'C+';
  const cVal=(ch.value!=null&&ch.value!=='')?ch.value:(a.discount_value||'');
  const profit=profitPerGal(cType, cVal, cost, retail);
  const hero=(profit==null)
    ? '<div class="opt-profit muted">— enter cost &amp; retail</div>'
    : '<div class="opt-profit">'+profit+'¢ / gal</div>';
  // recommendation re-anchored into the unit the stop currently has selected
  const rec=reanchor(a.discount_type, a.discount_value, cType, cost, retail);
  const recTxt=(rec.value==null)
    ? unitLabel(a.discount_type)+' '+esc(a.discount_value||'?')+' <span class="opt-faint">(enter cost &amp; retail to compare)</span>'
    : '<b>'+unitLabel(rec.type)+' '+rec.value+'</b>';
  const st=ch.status||'';
  const aid=esc(a.id);
  return '<div class="opt-card" data-agg="'+aid+'">'
    +'<div class="opt-name">'+esc(a.name)+'</div>'
    +(a.carriers?'<div class="opt-fleets">'+esc(a.carriers)+' fleets</div>':'')
    +(a.description?'<div class="opt-desc">'+esc(a.description)+'</div>':'')
    +hero
    +'<div class="opt-rec">Recommended: '+recTxt+'</div>'
    +'<div class="opt-disc">'
      +'<button type="button" class="opt-type'+(cType==='C+'?' on':'')+'" data-opt-type="C+" data-agg="'+aid+'">Cost +</button>'
      +'<button type="button" class="opt-type'+(cType==='R-'?' on':'')+'" data-opt-type="R-" data-agg="'+aid+'">Retail −</button>'
      +'<input class="opt-val" type="text" inputmode="numeric" maxlength="2" data-opt-value="1" data-agg="'+aid+'" value="'+esc(cVal)+'" placeholder="¢">'
      +'<span class="opt-faint">¢</span>'
    +'</div>'
    +'<div class="opt-choose">'
      +'<button type="button" class="opt-status'+(st==='Yes'?' on':'')+'" data-opt-status="Yes" data-agg="'+aid+'">Agree</button>'
      +'<button type="button" class="opt-status'+(st==='No'?' on':'')+'" data-opt-status="No" data-agg="'+aid+'">Decline</button>'
    +'</div>'
  +'</div>';
}
function render(){
  const root=byId('optBody'); if(!root) return _lastHTML;
  if(!_stop){ root.innerHTML=''; _lastHTML=''; return _lastHTML; }
  const cost=readVal('optCost'), retail=readVal('optRetail');
  const firm='<div class="opt-firm">If you do not respond, you will be automatically enrolled at the '
    +'<b>recommended discount</b> for each aggregator below.</div>';
  _lastHTML=firm+(_aggs||[]).map(a=>cardHTML(a,cost,retail)).join('');
  root.innerHTML=_lastHTML;
  return _lastHTML;
}

/* =====================================================================
   SUBMIT — build the per-aggregator payload and write via the right RPC.
   A card the stop touched (Agree/Decline or a discount change) uses its
   chosen values; an untouched card defaults to the recommendation with
   status 'No Response' (the firm-statement default). BO is never produced
   (the form is single-type per card).
   ===================================================================== */
function buildChoices(stop, aggregators, choices){
  choices=choices||{};
  return (aggregators||[]).map(function(a){
    const ch=choices[a.id]||{};
    const responded = ch.status==='Yes' || ch.status==='No';
    const touched = responded || ch.touched===true;
    const status = responded ? ch.status : 'No Response';
    // untouched BO default coerces to C+ (the form is single-unit; never emit a blank-value BO row)
    const type = (touched && ch.type) ? ch.type : (a.discount_type==='BO'?'C+':(a.discount_type||''));
    const valStr = (touched && ch.value!=null && ch.value!=='')
      ? String(ch.value) : String(a.discount_value==null?'':a.discount_value);
    return { aggregator_id:a.id, status:status, discount_type:type,
      retail_minus: type==='R-' ? valStr : '',
      cost_plus:    type==='C+' ? valStr : '' };
  });
}
function aggName(id){ const a=(_aggs||[]).find(function(x){return x.id===id;}); return a?a.name:id; }
function confirmHTML(stop, payload){
  const rows=payload.map(function(p){
    const disc = p.discount_type==='C+' ? ('Cost + '+esc(p.cost_plus))
               : p.discount_type==='R-' ? ('Retail − '+esc(p.retail_minus)) : '—';
    return '<tr><td>'+esc(aggName(p.aggregator_id))+'</td><td>'+esc(p.status)+'</td><td>'+disc+'</td></tr>';
  }).join('');
  return '<div id="optDone" class="opt-done"><h2>Thank you!</h2>'
    +'<p>Your opt-in choices for <b>'+esc(stop&&stop.name||'your stop')+'</b> have been recorded. '
    +'You can reopen your link any time to update them.</p>'
    +'<table class="opt-summary"><thead><tr><th>Aggregator</th><th>Response</th><th>Discount</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>';
}
async function submit(){
  const sb=sbc();
  if(!sb) return {ok:false, error:'offline'};
  const payload=buildChoices(_stop, _aggs, _choices);
  let res;
  if(_session && _session.mode==='code'){
    res=await sb.rpc('submit_optin_by_code', {p_code:_session.code, p_name:_session.name, p_choices:payload});
  } else {
    const token=(_session&&_session.token)||currentToken();
    res=await sb.rpc('submit_optin', {p_token:token, p_choices:payload});
  }
  if(res && res.error) return {ok:false, error:(res.error.message||'submit failed')};
  _lastHTML=confirmHTML(_stop, payload);
  const root=byId('optBody'); if(root) root.innerHTML=_lastHTML;
  const sbtn=byId('optSubmit'); if(sbtn) sbtn.hidden=true;
  const calc=byId('optCalc'); if(calc) calc.hidden=true;
  return {ok:true};
}

/* ---------- live interaction (real page; verified in-browser) ---------- */
function setChoice(aggId, patch){
  if(!aggId) return;
  _choices[aggId]=Object.assign({}, _choices[aggId], patch, {touched:true});
}
function recalc(){
  const cost=readVal('optCost'), retail=readVal('optRetail');
  (_aggs||[]).forEach(function(a){
    const card=document.querySelector('.opt-card[data-agg="'+a.id+'"]'); if(!card) return;
    const ch=_choices[a.id]||{}; const cType=ch.type||a.discount_type||'C+';
    const valEl=card.querySelector('[data-opt-value]');
    const cVal=valEl?valEl.value:(ch.value!=null?ch.value:a.discount_value);
    const profit=profitPerGal(cType, cVal, cost, retail);
    const pEl=card.querySelector('.opt-profit');
    if(pEl){ if(profit==null){pEl.className='opt-profit muted';pEl.textContent='— enter cost & retail';}
             else {pEl.className='opt-profit';pEl.textContent=profit+'¢ / gal';} }
    const rEl=card.querySelector('.opt-rec');
    if(rEl){ const rec=reanchor(a.discount_type, a.discount_value, cType, cost, retail);
      rEl.innerHTML='Recommended: '+(rec.value==null
        ? unitLabel(a.discount_type)+' '+esc(a.discount_value||'?')+' <span class="opt-faint">(enter cost &amp; retail to compare)</span>'
        : '<b>'+unitLabel(rec.type)+' '+rec.value+'</b>'); }
  });
}
function onBodyClick(e){
  const tEl=e.target.closest && e.target.closest('[data-opt-type]');
  if(tEl){ setChoice(tEl.getAttribute('data-agg'), {type:tEl.getAttribute('data-opt-type')}); render(); return; }
  const sEl=e.target.closest && e.target.closest('[data-opt-status]');
  if(sEl){ setChoice(sEl.getAttribute('data-agg'), {status:sEl.getAttribute('data-opt-status')}); render(); }
}
function onBodyInput(e){
  const vEl=e.target.closest && e.target.closest('[data-opt-value]');
  if(vEl){ // update value + recompute in place (no re-render, keeps caret in the input)
    const clean=String(vEl.value||'').replace(/[^0-9]/g,'').slice(0,2);
    if(clean!==vEl.value) vEl.value=clean;
    setChoice(vEl.getAttribute('data-agg'), {value:clean}); recalc(); }
}
let _wired=false;
function wire(){
  if(_wired) return; _wired=true;   // mount() may run again on re-resolve; bind once
  const body=byId('optBody');
  if(body){ body.addEventListener('click', onBodyClick); body.addEventListener('input', onBodyInput); }
  const cost=byId('optCost'), retail=byId('optRetail');
  if(cost) cost.addEventListener('input', recalc);
  if(retail) retail.addEventListener('input', recalc);
  const sbtn=byId('optSubmit');
  if(sbtn) sbtn.addEventListener('click', async function(){
    sbtn.disabled=true; const msg=byId('optMsg'); if(msg) msg.textContent='';
    const r=await submit();
    if(!r.ok){ sbtn.disabled=false; if(msg) msg.textContent='Could not submit — please try again.'; }
  });
}
function mount(stop, aggregators){
  _stop=stop; _aggs=aggregators||[]; _choices={};
  const t=byId('optTitle'); if(t) t.textContent=(stop.name||'Aggregator Opt-In');
  const sub=byId('optSub');
  if(sub) sub.textContent=[stop.city,stop.state].filter(Boolean).join(', ')+(stop.code?' · '+stop.code:'');
  const calc=byId('optCalc'); if(calc) calc.hidden=false;
  const sbtn=byId('optSubmit'); if(sbtn) sbtn.hidden=false;
  const fb=byId('optFallback'); if(fb) fb.hidden=true;
  render(); wire();
}
async function onFallbackFind(e){
  if(e && e.preventDefault) e.preventDefault();
  const code=((byId('optFallCode')||{}).value||'').trim();
  const name=((byId('optFallName')||{}).value||'').trim();
  const msg=byId('optFallMsg'); if(msg) msg.textContent='';
  const r=await resolveByCode(code, name);
  if(r.stop){ mount(r.stop, r.aggregators); }
  else if(msg){ msg.textContent = r.error
    ? 'Could not reach the service. Please try again.'
    : 'No unique match for that store # and name. Check both and try again.'; }
}
function showFallback(){
  const fb=byId('optFallback'); if(fb) fb.hidden=false;
  // ONE handler only: the Find button is type="submit", so the form's submit
  // event covers it. A second click listener would fire onFallbackFind twice
  // (double RPC) per press.
  const form=byId('optFallback');
  if(form) form.addEventListener('submit', onFallbackFind);
}
async function init(){
  const r=await resolveStop();

// (listener registered, never fired) so init() does not run during eval.

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();
}
