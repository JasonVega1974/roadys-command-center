<!--
  Roady's — Truck Stop Aggregator Opt-In
  -------------------------------------------------------------
  Public, token-gated opt-in form for truck stops. RPC-only against
  Supabase (resolve_optin_token / resolve_optin_by_code /
  list_optin_aggregators / submit_optin) — it holds NO direct table
  grants and never reads optin_token. Built across plan tasks 1-4.
  Task 1: page scaffold + calculator pure functions (profit/gal, re-anchor).
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Roady's — Aggregator Opt-In</title>
<style>
:root{
  --o-bg:#0e1117; --o-surface:#161c26; --o-surface-2:#1c2431; --o-line:#2a3547;
  --o-text:#e8edf4; --o-muted:#8a98ac; --o-faint:#5c6a7e;
  --o-amber:#f5a524; --o-green:#34d399; --o-green-soft:#10311f; --o-red:#f87171;
  --o-radius:12px; --o-sans:"Inter","Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--o-sans);color:var(--o-text);
  background:radial-gradient(1100px 560px at 80% -10%,#16202e 0,transparent 60%),var(--o-bg);
  min-height:100vh;line-height:1.45;font-size:14px;-webkit-font-smoothing:antialiased}
.opt-wrap{max-width:880px;margin:0 auto;padding:24px 18px 80px}
.opt-head h1{font-size:20px;margin:0 0 2px;letter-spacing:-.2px}
.opt-head .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--o-faint);font-weight:700}
#optBody{margin-top:18px}
</style>
</head>
<body>
<div class="opt-wrap">
  <div class="opt-head">
    <div class="eyebrow">Roady's Network</div>
    <h1>Aggregator Opt-In</h1>
  </div>
  <div id="optBody"></div>
</div>

<script>
(function(){
"use strict";

/* =====================================================================
   SUPABASE — RPC ONLY. This page calls four SECURITY DEFINER functions
   and holds NO direct table grants; it never reads optin_token.
   Setup copied verbatim from gs-command-center.html (same project/anon key).
   ===================================================================== */
const ROADYS_SB_URL = 'https://yyhnnalsqzyghjqtfisy.supabase.co';
const ROADYS_SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5aG5uYWxzcXp5Z2hqcXRmaXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDE4NzksImV4cCI6MjA4OTQxNzg3OX0.misOc3tEQD0GBOsjNkv6Im8wUmlfXhiX97DflpgaqAc';
let _sbClient = null;
function ensureSupabaseLib(){
  if(typeof window !== 'undefined' && window.supabase) return Promise.resolve(window.supabase);
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.onload = () => window.supabase ? resolve(window.supabase) : reject(new Error('supabase-js loaded but window.supabase undefined'));
    s.onerror = () => reject(new Error('supabase-js CDN load failed'));
    document.head.appendChild(s);
  });
}
function getRoadysSB(){
  if(_sbClient) return _sbClient;
  if(typeof window !== 'undefined' && window.supabase){
    try { _sbClient = window.supabase.createClient(ROADYS_SB_URL, ROADYS_SB_ANON); return _sbClient; }
    catch(e){ console.warn('getRoadysSB: ' + e.message); return null; }
  }
  return null;
}

/* ---------- stop resolution (token via ?t=, or store#+name fallback) ----------
   Resolution returns only safe stop fields; optin_token is stripped SERVER-SIDE
   by the SECURITY DEFINER function — the client never receives or reads it. */
let _client=null;   // test override; falls back to getRoadysSB()
let _query=null;    // test override for the query string
function sbc(){ return _client || getRoadysSB(); }
function currentToken(){
  if(_query) return _query.t||"";
  try{ return new URLSearchParams(window.location.search).get('t')||""; }catch(e){ return ""; }
}
async function loadAggregators(sb){
  const {data,error}=await sb.rpc('list_optin_aggregators');
  return error?[]:(data||[]);
}
async function resolveStop(){
  const sb=sbc();
  if(!sb) return {needFallback:true};            // lib not ready / client unavailable
  const tok=currentToken();
  if(!tok) return {needFallback:true};
  const {data,error}=await sb.rpc('resolve_optin_token',{p_token:tok});
  if(error||!data||!data.length) return {needFallback:true};
  return {stop:data[0], aggregators:await loadAggregators(sb)};
}
async function resolveByCode(code,name){
  const sb=sbc();
  if(!sb) return {error:true};                   // can't reach the service
  const {data,error}=await sb.rpc('resolve_optin_by_code',{p_code:code,p_name:name});
  if(error||!data||!data.length) return {notFound:true};
  return {stop:data[0], aggregators:await loadAggregators(sb)};
}

/* =====================================================================
   CALCULATOR (pure) — per-gallon profit + discount-unit re-anchoring
   ---------------------------------------------------------------------
   cost / retail are dollars per gallon (e.g. 3.00). Values are cents.
     Cost + X  -> the stop nets X cents/gal (margin above its cost).
     Retail - Y-> the stop nets (retail - cost) - Y cents/gal.
   ===================================================================== */
function profitPerGal(type, value, cost, retail){
  const v = parseFloat(value); if(isNaN(v)) return null;
  if(type==='C+') return v;                          // cost-plus: the +X cents
  if(type==='R-'){                                   // retail-minus: spread - Y (needs cost+retail)
    const c=parseFloat(cost), r=parseFloat(retail);
    if(isNaN(c)||isNaN(r)) return null;
    return Math.round((r-c)*100) - v;
  }
  return null;
}
// Express a recommended discount in the unit the stop currently has selected,
// using their spread, so the recommendation and their choice share one unit.
// R-Y and C+X are equal when X = spread - Y (and Y = spread - X), so the
// re-anchored recommendation carries the SAME profit.
function reanchor(recType, recValue, targetType, cost, retail){
  if(recType===targetType) return {type:recType, value:parseInt(recValue,10)||0};
  const c=parseFloat(cost), r=parseFloat(retail);
  if(isNaN(c)||isNaN(r)) return {type:targetType, value:null};   // need the spread to convert
  const spread=Math.round((r-c)*100), v=parseInt(recValue,10)||0;
  // symmetric by construction: X = spread - Y AND Y = spread - X, so this one
  // formula converts in both directions (R-→C+ and C+→R-). Do not split it.
  return {type:targetType, value: spread - v};
}

window.OPTIN = { __test:{ profitPerGal, reanchor, resolveStop, resolveByCode,
  setClient(c){_client=c;}, setQuery(q){_query=q;} } };
})();
</script>
</body>
</html>
